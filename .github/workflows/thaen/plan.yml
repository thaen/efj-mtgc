name: Plan (thaen)

on:
  issues:
    types: [labeled]

concurrency:
  group: plan-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  plan:
    runs-on: [self-hosted, thaen]
    steps:
      - name: Preflight checks
        env:
          GH_TOKEN: ${{ secrets.CLAUDE_BOT_TOKEN }}
        run: >
          bash /opt/dd-ci-code/.github/ci/preflight.sh
          "${{ github.event.issue.number }}"
          "${{ github.repository }}"
          "${{ github.event.issue.user.login }}"
          "${{ github.event.label.name }}"

      - name: Run planning agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.CLAUDE_BOT_TOKEN }}
        run: >
          bash /opt/dd-ci-code/.github/ci/sandbox-run.sh
          plan
          "${{ github.event.issue.number }}"
          "${{ github.repository }}"

