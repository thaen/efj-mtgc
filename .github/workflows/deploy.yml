name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      instance:
        description: 'Instance name (e.g. prod, staging)'
        required: true
        default: 'prod'

env:
  INSTANCE: ${{ github.event.inputs.instance || 'prod' }}

jobs:
  deploy:
    runs-on: [self-hosted, rgantt]
    steps:
      - name: Pull latest code
        run: git -C /opt/mtgc-${{ env.INSTANCE }} pull --ff-only origin ${{ github.ref_name }}

      - name: Prune dangling images
        run: podman image prune -f

      - name: Build and restart
        run: bash /opt/mtgc-${{ env.INSTANCE }}/deploy/deploy.sh ${{ env.INSTANCE }}

  deploy-native:
    runs-on: [self-hosted, thaen]
    steps:
      - name: Pull latest code
        run: git -C /opt/deckdumpster-code pull --ff-only origin main

      - name: Sync dependencies
        run: cd /opt/deckdumpster-code && uv sync --no-dev

      - name: Restart server
        run: launchctl kickstart -k gui/$(id -u)/com.deckdumpster.server

      - name: Health check
        run: |
          for i in 1 2 3 4 5; do
            if curl -sk --max-time 5 https://localhost:8080/ > /dev/null 2>&1; then
              echo "Health check passed"
              exit 0
            fi
            echo "Attempt $i/5 — waiting..."
            sleep 5
          done
          echo "Health check failed"
          exit 1
