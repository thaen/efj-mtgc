# Scenario: Deleting a deck does not delete its cards from the collection
#
# Related:
#   issues: [127]
#   pull_requests: []

description: >
  Navigate to the Decks page. Click on "Eldrazi Ramp" to open it. Verify it
  shows 6 cards in the mainboard. Note the card "Disruptor Flute" in the list.
  Click the "Delete Deck" button in the top-right corner. A confirmation dialog
  will appear — accept it. Verify you are returned to the deck list and
  "Eldrazi Ramp" is no longer shown. Navigate to the Collection page. Search
  for "Disruptor Flute" in the search box. Verify "Disruptor Flute" still
  appears in the collection.
