# Scenario: Add a card to a deck using the card modal controls
#
# Related:
#   issues: [127]
#   pull_requests: []

description: >
  Navigate to the Collection page. Search for "Cathar Commando" in the search
  box. Switch to grid view using the grid toggle button. Click on the Cathar
  Commando card image to open its detail modal. Scroll down in the modal to
  find the Copies section. The copy should show "Unassigned" with an "Add to
  Deck" dropdown. Select "Bolt Tribal" from the "Add to Deck" dropdown. Verify
  the copy now shows "Deck: Bolt Tribal" instead of "Unassigned".
