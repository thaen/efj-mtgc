# Scenario: Filter the collection by deck and binder assignment
#
# Related:
#   issues: [127]
#   pull_requests: []

description: >
  Navigate to the Collection page. Look for a "Container" filter dropdown
  in the sidebar (or filter controls area). It should have options like
  "All Cards", "Unassigned", and any existing decks or binders. Select
  "Unassigned" from the container filter. Verify that the collection
  view updates to show only cards that are not assigned to any deck or
  binder. Then switch back to "All Cards" and verify the full collection
  is shown again.
