# Scenario: Create a binder and manage cards in it
#
# Related:
#   issues: [127]
#   pull_requests: []

description: >
  Navigate to the Binders page. Click the "New Binder" button. Enter
  "Trade Binder" as the name and "blue" as the color. Click Create.
  Verify the binder appears in the list showing the name "Trade Binder".
  Click on the binder to open its detail view. Verify the detail view
  shows the binder name and an empty card list. Click "Add Cards" to
  open the card picker. Select at least one card and confirm. Verify
  the card appears in the binder's card list.
