# Scenario: Accordion pop-down shows card data on Recent Images
#
# Related:
#   issues: []
#   pull_requests: []

description: >
  Navigate to the Recent Images page. If no images are visible, expand
  the time window by clicking the 24h pill. Then click on any image card
  that has a "done" (green border) or "needs_disambiguation" (red border) status.
  Verify that a full-width accordion panel appears below that row of cards
  with the clicked card highlighted in red. The accordion panel should show
  real card data — look for any of: a card name in red text, a "Confirmed"
  or "Pending" status badge, candidate card images in a grid, a "Search"
  button, a "Reprocess" button, a "Delete Image" button, or an
  "Ingest trace" section. The test passes once you can see both the
  red-bordered selected card and meaningful card content (not just
  placeholder text like "Details for image ...") in the accordion panel.
