# Scenario: Search and select a card when the agent returned zero viable candidates
#
# Simulates the case where the agent identified a digital-only printing that was
# filtered out, leaving the user with no candidates. The user must search manually,
# select the correct card, and batch-ingest it.
#
# Related:
#   issues: []
#   pull_requests: [117]

description: >
  Navigate to the Recent Images page. Click the 24h pill.
  Look for a red-bordered card titled "Llanowar Elves" (it may be a dark
  placeholder image). It should have a red border because it has zero candidates.
  Click on it.
  The accordion drawer should open. The drawer should show:
    - Title "Llanowar Elves" on the left sidebar
    - A Reprocess button
    - A text field pre-filled with "Llanowar Elves"
    - The candidates area should say "No candidates found" or be empty
  Clear the search field and type "Llanowar Elves", then press Enter.
  Search results should appear showing Llanowar Elves printings as candidate cards.
  Click on any one of the search result candidates.
    The selected candidate should get a green border.
    The user photo should update with a set icon and finish badge.
  Click the Llanowar Elves photo again to collapse the accordion.
  The photo should now have a green border (not red).
  Click Batch Ingest in the upper right corner.
    The green-bordered photo should disappear.
    A success message should appear.
