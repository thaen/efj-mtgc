# Scenario: Load saved collection views from the sidebar
#
# Related:
#   issues: [127]
#   pull_requests: []

description: >
  Navigate to the Collection page. Click the "Filters" button to open the
  sidebar. Scroll down in the sidebar to find the "Saved Views" dropdown. It
  should contain the pre-made views "Unassigned Cards" and "Modern Staples".
  Select "Modern Staples" from the dropdown. Verify the search box now shows
  "crawler" and the collection has filtered to show Scrawling Crawler cards.
  Close the sidebar by clicking the "Close Filters" button. Confirm the table
  shows Scrawling Crawler cards.
