# Scenario: Create a deck and add cards to it
#
# Related:
#   issues: [127]
#   pull_requests: []

description: >
  Navigate to the Decks page. Click the "New Deck" button. In the modal,
  enter "Integration Test Deck" as the name and select "commander" as the
  format. Click Create. Verify the deck appears in the list with the name
  "Integration Test Deck" and format "commander". Click on the deck to
  open its detail view. Verify the detail view shows the deck name, zone
  tabs (Mainboard, Sideboard, Commander), and an empty card list. Click
  "Add Cards" to open the card picker. Select at least one card from the
  picker and confirm. Verify the card appears in the deck's card list.
