# Scenario: Move a card between deck and binder via the card modal
#
# Related:
#   issues: [127]
#   pull_requests: []

description: >
  Navigate to the Collection page. Search for "Scrawling Crawler" in the search
  box. Switch to grid view using the grid toggle button. Click on the first
  Scrawling Crawler card image to open its modal. Scroll down in the modal to
  find the Copies section. One or more copies should show "Deck: Bolt Tribal"
  with a "Move to Binder" dropdown. Select "Trade Binder" from the
  "Move to Binder" dropdown on that copy. Verify the copy now shows
  "Binder: Trade Binder" instead of "Deck: Bolt Tribal".
