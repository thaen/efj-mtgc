start_page: /decks/1
involves:
  - "#card-table tr[data-idx] click opens card modal"
  - ".card-modal-overlay.active showing card details"
  - ".modal-links a.badge.link with 'Full page' text"
  - "Card detail page at /card/fdn/100 for Beast-Kin Ranger"
  - ".card-detail-layout on card detail page"
fixture_data:
  deck_id: 1
  card_name: "Beast-Kin Ranger"
  card_set: "fdn"
  card_cn: "100"
  card_url: "/card/fdn/100"
notes: >
  Navigate to /decks/1. Wait for the card table to load (wait for
  "Beast-Kin Ranger" text). Click the "Beast-Kin Ranger" text in the
  card table row. Wait for the card modal to appear
  (.card-modal-overlay.active). Click the "Full page" link in the modal.
  Wait for the card detail page to load (.card-detail-layout). Verify
  the card name appears on the detail page. Take a screenshot.
