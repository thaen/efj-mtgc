start_page: /ingestor-ids
involves:
  - "rarity select #rarity-select"
  - "collector number input #cn-input"
  - "set code input #set-input"
  - "add button #add-btn"
  - "staging table #entry-tbody"
  - "resolve button #resolve-btn"
  - "results panel #results"
fixture_data:
  set_code: "fdn"
  collector_number: "100"
  rarity: "C"
  card_name: "Beast-Kin Ranger"
notes: >
  Navigate to /ingestor-ids. Wait for #cn-input. Select "C" from
  #rarity-select. Enter "100" in #cn-input. Enter "fdn" in #set-input.
  Click #add-btn. Verify row in #entry-tbody. Click #resolve-btn. Wait
  for "Beast-Kin Ranger" text to appear in results.
