start_page: /ingestor-ids
involves:
  - "collector number input #cn-input"
  - "set code input #set-input"
  - "add button #add-btn"
  - "resolve button #resolve-btn"
  - "foil toggle spans .foil-toggle in resolved table"
fixture_data:
  set_code: "fdn"
  collector_number: "100"
  card_name: "Beast-Kin Ranger"
notes: >
  Navigate to /ingestor-ids. Add a valid entry (CN 100, set fdn). Click
  #resolve-btn. Wait for resolved results. Click .foil-toggle.inactive to
  toggle to foil. Verify .foil-toggle.active appears. Click again to toggle
  back. Verify .foil-toggle.inactive appears.
