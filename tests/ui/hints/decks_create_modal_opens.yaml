start_page: /decks
involves:
  - '"New Deck" button in header controls'
  - "#deck-modal.active with h3#modal-title showing 'New Deck'"
  - "#f-name input with placeholder 'My Commander Deck'"
  - "#f-format select with format options"
  - "#f-description textarea"
  - "#f-precon checkbox labeled 'Preconstructed deck'"
  - "#precon-fields hidden by default (display:none)"
  - "#f-sleeve, #f-deckbox, #f-location text inputs"
  - "Save and Cancel buttons in .form-actions"
fixture_data: {}
notes: >
  Navigate to /decks. Wait for the page to load. Click the "New Deck" button.
  Wait for the modal to appear (#deck-modal.active). Verify the modal title
  shows "New Deck". Verify the Name field, Format dropdown, Description
  textarea, Preconstructed deck checkbox, Sleeve Color, Deck Box, and Storage
  Location fields are visible. Verify Save and Cancel buttons are visible.
  Verify the precon fields (Origin Set, Theme, Variation) are hidden. Check
  the precon checkbox and verify precon fields appear. Take a screenshot.
