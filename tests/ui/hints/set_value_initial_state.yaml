start_page: /set-value
involves:
  - "page title h1 'Set Value Analysis'"
  - "set search input #set-search (placeholder 'Search sets...')"
  - "source toggle #source-toggle with .pill.active[data-value=tcgplayer]"
  - "type toggle #type-toggle with .pill.active[data-value=normal]"
  - "analyze button #analyze-btn (disabled)"
  - "empty state #empty-state"
  - "filter bar #filter-bar (display:none)"
  - "summary #summary (display:none)"
  - "chart wrap #chart-wrap (display:none)"
  - "top cards #top-cards (display:none)"
fixture_data: {}
notes: >
  Navigate to /set-value. Verify h1 "Set Value Analysis". Verify
  #set-search is visible with placeholder. Verify #analyze-btn is
  visible but disabled. Verify #empty-state text is present. Verify
  #filter-bar, #summary, #chart-wrap, #top-cards are hidden.
