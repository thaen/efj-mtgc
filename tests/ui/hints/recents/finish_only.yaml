start_page: /recent
involves:
  - time filter pills (30m, 2h, 4h, 12h, 24h)
  - card photos with finish badges (e.g., "foil", "nonfoil") in the lower right
  - clicking a finish badge toggles the finish selection
  - active badge has a green border/background
notes: >
  1. Click the "24h" time pill. 2. Look for a card photo that has finish
  badges visible in the lower-right corner (small labels like "nonfoil"
  and/or "foil"). These appear on resolved cards with known printings.
  3. Click on a finish badge to toggle the selection (e.g., click "foil"
  if "nonfoil" is currently active, or vice versa). 4. The clicked badge
  should become active (green border) and the previously active one should
  become inactive. Done.
