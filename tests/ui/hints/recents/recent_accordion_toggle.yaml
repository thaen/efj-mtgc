start_page: /recent
involves:
  - card photo grid with bordered images
  - clicking a card photo opens a full-width accordion panel below that row
  - accordion shows candidate cards with set icons and details
  - clicking the same photo again collapses the accordion
  - time filter pills (30m, 2h, 4h, 12h, 24h)
notes: >
  The default 2h pill already shows all images — no need to change it.
  1. Click a card photo (e.g. "Arenson's Aura"). 2. The accordion panel
  (#accordion-panel) appears with class "open". 3. Click the same card
  again. 4. The accordion closes (class "open" removed). Done.
