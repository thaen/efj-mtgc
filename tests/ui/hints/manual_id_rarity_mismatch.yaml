start_page: /ingestor-ids
involves:
  - "rarity select #rarity-select"
  - "collector number input #cn-input"
  - "set code input #set-input"
  - "add button #add-btn"
  - "resolve button #resolve-btn"
  - "results panel #results with rarity mismatch warning"
fixture_data:
  set_code: "fdn"
  collector_number: "100"
  selected_rarity: "R"
  actual_rarity: "C"
  card_name: "Beast-Kin Ranger"
notes: >
  Navigate to /ingestor-ids. Select "R" (Rare) from #rarity-select. Enter
  "100" in #cn-input and "fdn" in #set-input. Click #add-btn. Click
  #resolve-btn. Verify card shows "Beast-Kin Ranger" with a rarity mismatch
  warning showing "Expected R, got C" or similar yellow text.
