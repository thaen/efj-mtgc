start_page: /decks
involves:
  - "\"New Deck\" button to create a throwaway deck"
  - "#deck-modal form for deck creation"
  - "\"Delete Deck\" button (#btn-delete) on detail page"
  - "window.confirm dialog"
  - "Redirect back to /decks list page"
fixture_data:
  throwaway_deck_name: "Deck To Delete"
notes: >
  Navigate to /decks. Create a new deck named "Deck To Delete" via the
  New Deck modal (this redirects to the new deck's detail page). On the
  detail page, click "Delete Deck". Accept the confirmation dialog.
  Wait for redirect back to /decks. Verify the URL is /decks. Verify
  "Deck To Delete" no longer appears in the list. Take a screenshot.
