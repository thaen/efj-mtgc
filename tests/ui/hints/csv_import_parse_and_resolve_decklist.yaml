start_page: /import-csv
involves:
  - "textarea #csv-text"
  - "parse button #parse-btn"
  - "summary bar .summary-bar with total, resolved, format"
  - "resolved cards table .item-table"
  - "action bar .action-bar with commit, cancel, assign dropdown"
fixture_data:
  decklist: "1 Beast-Kin Ranger (FDN) 100\n1 Cathar Commando (FDN) 139"
  expected_cards: ["Beast-Kin Ranger", "Cathar Commando"]
notes: >
