<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="icon" href="/static/favicon.ico" type="image/x-icon">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sealed Collection</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #1a1a2e;
  color: #e0e0e0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  min-height: 100vh;
}

header {
  background: #16213e;
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;
  border-bottom: 2px solid #0f3460;
}

header h1 {
  font-size: 1.3rem;
  color: #e94560;
  margin-right: 16px;
  white-space: nowrap;
}

header h1 a { color: inherit; text-decoration: none; }
header h1 a:hover { text-decoration: underline; }

.controls {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

input[type="text"], select, button {
  padding: 8px 14px;
  border: 1px solid #0f3460;
  border-radius: 6px;
  background: #1a1a2e;
  color: #e0e0e0;
  font-size: 0.9rem;
}

input[type="text"]:focus, select:focus { outline: 2px solid #e94560; }

button {
  background: #e94560;
  border-color: #e94560;
  color: #fff;
  font-weight: 600;
  cursor: pointer;
}

button:hover { background: #c73651; }

button.secondary {
  background: #333;
  border-color: #555;
}
button.secondary:hover { background: #e94560; border-color: #e94560; }
button.secondary.active { background: #0f3460; border-color: #e94560; }

#search-input { width: 220px; }

#status {
  font-size: 0.85rem;
  color: #888;
  margin-left: auto;
}

/* Layout */
.layout {
  display: flex;
  min-height: calc(100vh - 70px);
}

/* Sidebar */
.sidebar-backdrop {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4);
  z-index: 90;
}
.sidebar-backdrop.active { display: block; }

.sidebar {
  position: fixed;
  top: 0; left: -320px;
  width: 300px;
  height: 100vh;
  background: #16213e;
  border-right: 2px solid #0f3460;
  padding: 16px;
  overflow-y: auto;
  z-index: 91;
  transition: left 0.25s ease;
  box-shadow: 4px 0 20px rgba(0,0,0,0.5);
}

.sidebar.open { left: 0; }

.sidebar h3 {
  font-size: 0.85rem;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin: 16px 0 8px;
}

.sidebar h3:first-child { margin-top: 0; }

/* Pill groups */
.pill-group { display: flex; flex-wrap: wrap; gap: 4px; }
.pill-group input[type="checkbox"] { display: none; }
.pill-group label {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 4px 12px;
  border: 1px solid #0f3460;
  border-radius: 20px;
  font-size: 0.8rem;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  user-select: none;
}
.pill-group label:hover { border-color: #e94560; }
.pill-group input[type="checkbox"]:checked + label {
  background: #e94560;
  border-color: #e94560;
  color: #fff;
}

/* Multi-select search component */
.multi-select-wrap { position: relative; }
.multi-search-input {
  width: 100%;
  padding: 6px 10px;
  border: 1px solid #0f3460;
  border-radius: 4px;
  background: #1a1a2e;
  color: #e0e0e0;
  font-size: 0.85rem;
}
.multi-search-input:focus { outline: 2px solid #e94560; }
.multi-dropdown {
  display: none;
  position: fixed;
  max-height: 200px;
  overflow-y: auto;
  background: #1a1a2e;
  border: 1px solid #0f3460;
  border-top: none;
  border-radius: 0 0 4px 4px;
  z-index: 200;
  list-style: none;
}
.multi-dropdown.open { display: block; }
.multi-dropdown li {
  padding: 6px 10px;
  font-size: 0.85rem;
  cursor: pointer;
}
.multi-dropdown li:hover { background: #0f3460; }
.multi-dropdown li.selected { color: #e94560; }
.selected-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 4px;
}
.selected-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  background: #0f3460;
  border: 1px solid #e94560;
  border-radius: 12px;
  font-size: 0.75rem;
  color: #e0e0e0;
}
.selected-pill .remove-pill {
  cursor: pointer;
  color: #e94560;
  font-weight: bold;
  font-size: 0.85rem;
  line-height: 1;
}
.selected-pill .remove-pill:hover { color: #fff; }

/* Range filter inputs */
.range-row {
  display: flex;
  gap: 6px;
  align-items: center;
}
.range-row input[type="number"], .range-row input[type="date"] {
  width: 60px;
  padding: 4px 6px;
  border: 1px solid #0f3460;
  border-radius: 4px;
  background: #1a1a2e;
  color: #e0e0e0;
  font-size: 0.8rem;
}
.range-row input[type="date"] { width: auto; }
.range-row input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.7); }
.range-row input[type="number"]:focus, .range-row input[type="date"]:focus { outline: 2px solid #e94560; }
.range-row span { font-size: 0.8rem; color: #888; }

/* Main content */
.main {
  flex: 1;
  padding: 4px;
  overflow-y: auto;
}

/* Card grid */
.card-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.sheet-card {
  width: var(--grid-card-width, 220px);
  position: relative;
  cursor: pointer;
}

.sheet-card-img-wrap {
  width: var(--grid-card-width, 220px);
  aspect-ratio: 1 / 1;
  border-radius: 8px;
  position: relative;
  overflow: hidden;
  background: #111;
}

.sheet-card-img-wrap img {
  position: absolute;
  top: 2px; left: 2px;
  width: calc(100% - 4px);
  height: calc(100% - 4px);
  object-fit: contain;
  border-radius: 6px;
  image-rendering: high-quality;
  background: #0a0a1a;
}

.sheet-card-img-wrap .no-image {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #555;
  font-size: 0.8rem;
  text-align: center;
  padding: 8px;
}

.qty-badge {
  position: absolute;
  top: 6px; right: 6px;
  background: rgba(233, 69, 96, 0.9);
  color: #fff;
  font-size: 0.75rem;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 10px;
  z-index: 3;
}

.status-badge {
  position: absolute;
  top: 6px; left: 6px;
  font-size: 0.65rem;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 10px;
  z-index: 3;
  text-transform: uppercase;
}
.status-badge.owned { background: rgba(76, 175, 80, 0.85); color: #fff; }
.status-badge.listed { background: rgba(130, 0, 255, 0.85); color: #fff; }
.status-badge.opened { background: rgba(255, 152, 0, 0.85); color: #fff; }
.status-badge.sold { background: rgba(26, 92, 58, 0.85); color: #7ee8b0; }
.status-badge.traded { background: rgba(92, 74, 26, 0.85); color: #e8d07e; }
.status-badge.gifted { background: rgba(26, 58, 92, 0.85); color: #7eb8e8; }

.card-info {
  padding: 6px 2px;
  font-size: 0.8rem;
  line-height: 1.3;
}
.card-info .card-name {
  font-weight: 600;
  color: #e0e0e0;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-info .card-set {
  color: #888;
  font-size: 0.75rem;
}
.card-info .card-price {
  color: #4caf50;
  font-size: 0.75rem;
  font-weight: 600;
}

.empty-state {
  color: #555;
  font-style: italic;
  font-size: 0.9rem;
  padding: 32px;
  text-align: center;
}

/* Sort bar */
.sort-bar {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}

.sort-btn {
  padding: 4px 10px;
  border: 1px solid #0f3460;
  border-radius: 4px;
  background: #16213e;
  color: #888;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
}

.sort-btn:hover { color: #e94560; border-color: #e94560; }
.sort-btn.active { color: #e94560; border-color: #e94560; background: #1a1a2e; }

.size-slider-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.8rem;
  color: #888;
}

.size-slider-wrap input[type="range"] {
  width: 100px;
  accent-color: #e94560;
}

.sort-arrow { font-size: 0.7rem; margin-left: 2px; }

/* View toggle */
.view-toggle-group {
  display: flex;
}
.view-toggle-group button.secondary {
  border-radius: 0;
}
.view-toggle-group button.secondary:first-child {
  border-radius: 6px 0 0 6px;
}
.view-toggle-group button.secondary:last-child {
  border-radius: 0 6px 6px 0;
  margin-left: -1px;
}
.view-toggle-group button.secondary.active {
  z-index: 1;
  position: relative;
}
.view-toggle-group button svg { display: block; }

/* Table view */
.sealed-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.85rem;
}
.sealed-table th {
  text-align: left;
  padding: 8px 12px;
  border-bottom: 2px solid #0f3460;
  color: #888;
  font-weight: 600;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
}
.sealed-table th:hover { color: #e94560; }
.sealed-table th.sorted { color: #e94560; }
.sealed-table td {
  padding: 6px 12px;
  border-bottom: 1px solid #0f346033;
  vertical-align: middle;
}
.sealed-table tr:hover { background: rgba(15, 52, 96, 0.2); }
.sealed-table tr { cursor: pointer; }
.sealed-table .col-image { width: 48px; padding: 4px 0; }
.sealed-table .table-thumb {
  width: 40px;
  height: 40px;
  object-fit: contain;
  border-radius: 4px;
  background: #0a0a1a;
  vertical-align: middle;
}
.market-price { color: #7ec8e3; font-size: 0.75rem; font-weight: 600; }

/* Column config drawer */
.col-drawer-backdrop {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 89;
}
.col-drawer-backdrop.active { display: block; }

.col-drawer {
  position: fixed;
  top: 0; right: -320px;
  width: 260px;
  height: 100vh;
  background: #16213e;
  border-left: 2px solid #0f3460;
  padding: 16px;
  overflow-y: auto;
  z-index: 91;
  transition: right 0.25s ease;
  box-shadow: -4px 0 20px rgba(0,0,0,0.5);
}
.col-drawer.open { right: 0; }
.col-drawer h3 {
  font-size: 0.85rem;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin: 0 0 12px;
}
.col-drawer label {
  display: block;
  padding: 6px 0;
  cursor: pointer;
  font-size: 0.85rem;
  user-select: none;
}
.col-drawer input[type="checkbox"] {
  margin-right: 8px;
  accent-color: #e94560;
}

.col-config-th {
  cursor: pointer !important;
  color: #888 !important;
  width: 28px;
  padding: 8px 4px !important;
  text-align: center !important;
}
.col-config-th:hover { color: #e94560 !important; }
.col-config-th.active { color: #e94560 !important; }
.col-config-th svg { width: 16px; height: 16px; vertical-align: middle; fill: currentColor; }

/* Contents list in modal */
.contents-list {
  list-style: none;
  font-size: 0.85rem;
}
.contents-list li {
  padding: 2px 0;
  color: #ccc;
}
.contents-list .contents-count {
  color: #e94560;
  font-weight: 600;
  margin-right: 4px;
}
.prices-status {
  font-size: 0.75rem;
  color: #666;
  cursor: pointer;
  user-select: none;
}
.prices-status:hover { color: #aaa; }
.prices-status.loading { color: #e94560; }
.price-history-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.8rem;
  margin-top: 6px;
}
.price-history-table th {
  text-align: left;
  color: #888;
  font-weight: 600;
  padding: 4px 6px;
  border-bottom: 1px solid #333;
}
.price-history-table td {
  padding: 3px 6px;
  color: #ccc;
}
.price-history-table tr:hover td {
  background: #252530;
}
.gain { color: #4caf50; }
.loss { color: #e94560; }

/* TCGPlayer URL input in add modal */
.tcg-url-row {
  display: flex;
  gap: 8px;
  padding: 12px 24px;
  border-bottom: 1px solid #0f3460;
  align-items: center;
}
.tcg-url-row input {
  flex: 1;
  padding: 8px 12px;
  border: 1px solid #0f3460;
  border-radius: 6px;
  background: #1a1a2e;
  color: #e0e0e0;
  font-size: 0.85rem;
}
.tcg-url-row input:focus { outline: 2px solid #e94560; }
.tcg-url-row button { flex-shrink: 0; padding: 8px 14px; }
.tcg-url-row .tcg-error { color: #e87e7e; font-size: 0.8rem; }

/* Detail modal */
#detail-modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.8);
  z-index: 100;
  justify-content: center;
  align-items: center;
}

#detail-modal-overlay.active { display: flex; }

.card-modal {
  background: #16213e;
  border-radius: 16px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.8);
  display: flex;
  gap: 0;
  max-height: 90vh;
  max-width: 90vw;
  overflow: hidden;
}

.card-modal-img {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  background: #0a0a1a;
  padding: 16px;
}

.card-modal-img img {
  height: 50vh;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.6);
  display: block;
}

.card-modal-details {
  width: 420px;
  padding: 24px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.card-modal-details h2 {
  font-size: 1.2rem;
  color: #fff;
  margin: 0;
  line-height: 1.3;
}

.modal-section {
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 8px 0;
}

.modal-section-title {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: #666;
  font-weight: 600;
}

.modal-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.85rem;
}

.modal-row .label { color: #888; }
.modal-row .value { color: #e0e0e0; font-weight: 500; }
.modal-row .value a { color: #7ec8e3; text-decoration: none; }
.modal-row .value a:hover { text-decoration: underline; }

.modal-links {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.modal-links a.badge.link {
  font-size: 0.75rem;
  padding: 3px 8px;
}

a.badge.link { background: #333; border: 1px solid #555; color: #aaa; text-decoration: none; font-variant-numeric: tabular-nums; white-space: nowrap; border-radius: 3px; }
a.badge.link:hover { color: #fff; background: #555; border-color: #777; }

.modal-close {
  position: absolute;
  top: 12px;
  right: 16px;
  background: none;
  border: none;
  color: #666;
  font-size: 1.5rem;
  cursor: pointer;
  padding: 4px 8px;
  line-height: 1;
}
.modal-close:hover { color: #e94560; background: none; }

/* Editable fields in modal */
.modal-edit-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.85rem;
  gap: 8px;
}
.modal-edit-row .label { color: #888; flex-shrink: 0; }
.modal-edit-row input, .modal-edit-row select, .modal-edit-row textarea {
  flex: 1;
  padding: 4px 8px;
  font-size: 0.85rem;
  background: #1a1a2e;
  border: 1px solid #0f3460;
  color: #e0e0e0;
  border-radius: 4px;
}
.modal-edit-row input:focus, .modal-edit-row select:focus, .modal-edit-row textarea:focus {
  outline: 2px solid #e94560;
}
.modal-edit-row textarea {
  resize: vertical;
  min-height: 40px;
  font-family: inherit;
}
.modal-edit-row input[type="number"] { width: 80px; flex: 0; }

/* Disposition badges */
.disposition-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
}
.disposition-badge.sold { background: #1a5c3a; color: #7ee8b0; }
.disposition-badge.traded { background: #5c4a1a; color: #e8d07e; }
.disposition-badge.gifted { background: #1a3a5c; color: #7eb8e8; }
.disposition-badge.listed { background: #3a1a5c; color: #b87ee8; }
.disposition-badge.opened { background: #5c3a1a; color: #e8b87e; }

/* Dispose controls */
.dispose-controls {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
  margin-top: 8px;
}
.dispose-controls select, .dispose-controls input {
  padding: 4px 8px;
  font-size: 0.8rem;
  background: #16213e;
  border: 1px solid #0f3460;
  color: #e0e0e0;
  border-radius: 4px;
}
.dispose-controls input { width: 80px; }
.dispose-btn {
  padding: 4px 10px;
  font-size: 0.8rem;
  background: #0f3460;
  border: 1px solid #0f3460;
  color: #7ec8e3;
  border-radius: 4px;
  cursor: pointer;
  font-weight: 600;
}
.dispose-btn:hover { background: #1a4a7a; }

.delete-btn {
  padding: 4px 10px;
  font-size: 0.8rem;
  background: #5c1a1a;
  border: 1px solid #7a2a2a;
  color: #e87e7e;
  border-radius: 4px;
  cursor: pointer;
  font-weight: 600;
}
.delete-btn:hover { background: #7a2a2a; color: #fff; }

.modal-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

/* Add product modal */
#add-modal-overlay, #open-modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.8);
  z-index: 100;
  justify-content: center;
  align-items: center;
}
#add-modal-overlay.active, #open-modal-overlay.active { display: flex; }

.add-modal {
  background: #16213e;
  border-radius: 16px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.8);
  width: 600px;
  max-width: 95vw;
  max-height: 90vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

.add-modal-header {
  padding: 20px 24px 12px;
  border-bottom: 1px solid #0f3460;
}
.add-modal-header h2 {
  font-size: 1.1rem;
  color: #fff;
  margin-bottom: 12px;
}
.add-modal-header input {
  width: 100%;
  padding: 10px 14px;
  border: 1px solid #0f3460;
  border-radius: 6px;
  background: #1a1a2e;
  color: #e0e0e0;
  font-size: 0.95rem;
}
.add-modal-header input:focus { outline: 2px solid #e94560; }

.add-modal-body {
  flex: 1;
  overflow-y: auto;
  padding: 0;
}

.product-results {
  list-style: none;
}
.product-results li {
  display: flex;
  gap: 12px;
  padding: 10px 24px;
  cursor: pointer;
  align-items: center;
  border-bottom: 1px solid #0f346033;
}
.product-results li:hover { background: rgba(15, 52, 96, 0.3); }
.product-results li img {
  width: 48px;
  height: 48px;
  object-fit: contain;
  border-radius: 4px;
  background: #0a0a1a;
  flex-shrink: 0;
}
.product-results .product-info {
  flex: 1;
  min-width: 0;
}
.product-results .product-name {
  font-weight: 600;
  font-size: 0.9rem;
  color: #e0e0e0;
}
.product-results .product-meta {
  font-size: 0.8rem;
  color: #888;
}

.add-form {
  padding: 16px 24px 24px;
  border-top: 1px solid #0f3460;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.add-form .selected-product {
  display: flex;
  gap: 12px;
  align-items: center;
  padding: 8px;
  background: #0f3460;
  border-radius: 8px;
  margin-bottom: 4px;
}
.add-form .selected-product img {
  width: 48px;
  height: 48px;
  object-fit: contain;

<body>

      <button class="secondary active" id="view-grid-btn" title="Grid view"><svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="1" width="6" height="6" rx="1"/><rect x="9" y="1" width="6" height="6" rx="1"/><rect x="1" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/></svg></button>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let allEntries = [];
let allEntriesFiltered = [];
let aggregatedProducts = [];
let allSets = [];
let selectedSets = new Map(); // code -> name
let sortKey = 'added_at';
let sortDir = -1; // -1 = desc
let viewMode = localStorage.getItem('sealedViewMode') || 'table';

// ─── Column config ──────────────────────────────────────────────────────────
const ALL_COLUMNS = [
  { key: 'qty',      label: 'Qty',      sort: 'total_quantity',  defaultOn: true },
  { key: 'image',    label: '',          sort: null,              defaultOn: true },
  { key: 'name',     label: 'Set',       sort: 'set_name',       defaultOn: true },
  { key: 'set',      label: 'Type',      sort: 'category',       defaultOn: true },
  { key: 'min_cost', label: 'Min Cost',  sort: 'min_cost',       defaultOn: true },
  { key: 'max_cost', label: 'Max Cost',  sort: 'max_cost',       defaultOn: false },
  { key: 'avg_cost', label: 'Avg Cost',  sort: 'avg_cost',       defaultOn: false },
  { key: 'market',   label: 'Market',    sort: 'market_total',   defaultOn: true },
  { key: 'added',    label: 'Added',     sort: 'added_at',       defaultOn: false },
  { key: 'status',   label: 'Status',    sort: 'primary_status', defaultOn: false },
];
const DEFAULT_COLS = ALL_COLUMNS.filter(c => c.defaultOn).map(c => c.key);
// Migrate old 'cost' column to 'min_cost'
let enabledCols = JSON.parse(localStorage.getItem('sealedCols') || 'null') || DEFAULT_COLS;
if (enabledCols.includes('cost')) {
  enabledCols = enabledCols.map(k => k === 'cost' ? 'min_cost' : k);
  localStorage.setItem('sealedCols', JSON.stringify(enabledCols));
}
const COL_SORT_MAP = Object.fromEntries(ALL_COLUMNS.map(c => [c.key, c.sort]));

function getVisibleColumns() { return ALL_COLUMNS.filter(c => enabledCols.includes(c.key)); }
function saveColumns() { localStorage.setItem('sealedCols', JSON.stringify(enabledCols)); }

const CATEGORIES = [
  'booster_box', 'booster_pack', 'booster_case',
  'bundle', 'bundle_case', 'box_set',
  'deck', 'commander_deck', 'starter_kit',
  'limited_aid_tool', 'case', 'other'
];

const STATUSES = ['owned', 'listed', 'opened', 'sold', 'traded', 'gifted'];

const VALID_TRANSITIONS = {
  owned: ['sold', 'traded', 'gifted', 'listed', 'opened'],
  listed: ['sold', 'traded', 'gifted', 'owned'],
};

// ─── DOM refs ────────────────────────────────────────────────────────────────
const statusEl = document.getElementById('status');
const mainEl = document.getElementById('main');
const searchInput = document.getElementById('search-input');
const filterBtn = document.getElementById('filter-btn');
const sidebar = document.getElementById('sidebar');
const sidebarBackdrop = document.getElementById('sidebar-backdrop');
const addBtn = document.getElementById('add-btn');
const addOverlay = document.getElementById('add-modal-overlay');
const addSearchInput = document.getElementById('add-search-input');
const addBody = document.getElementById('add-modal-body');
const productResults = document.getElementById('product-results');
const detailOverlay = document.getElementById('detail-modal-overlay');
const pricesStatus = document.getElementById('prices-status');
const colConfigList = document.getElementById('col-config-list');
const colDrawer = document.getElementById('col-drawer');
const colDrawerBackdrop = document.getElementById('col-drawer-backdrop');

// ─── Column config drawer ────────────────────────────────────────────────────
function renderColConfig() {
  colConfigList.innerHTML = '';
  for (const col of ALL_COLUMNS) {
    const input = document.createElement('input');
    input.type = 'checkbox';
    input.id = 'cc-' + col.key;
    input.checked = enabledCols.includes(col.key);
    input.addEventListener('change', () => {
      if (input.checked) {
        if (!enabledCols.includes(col.key)) enabledCols.push(col.key);
      } else {
        enabledCols = enabledCols.filter(k => k !== col.key);
      }
      saveColumns();
      render();
    });
    const label = document.createElement('label');
    label.htmlFor = 'cc-' + col.key;
    label.textContent = col.label;
    colConfigList.appendChild(input);
    colConfigList.appendChild(label);
  }
}
renderColConfig();

function toggleColDrawer(open) {
  if (open === undefined) open = !colDrawer.classList.contains('open');
  colDrawer.classList.toggle('open', open);
  colDrawerBackdrop.classList.toggle('active', open);
  const th = document.getElementById('col-config-th');
  if (th) th.classList.toggle('active', open);
}
colDrawerBackdrop.addEventListener('click', () => toggleColDrawer(false));

// ─── Init ────────────────────────────────────────────────────────────────────
(async () => {
  initFilters();
  initEventListeners();
  const savedSize = localStorage.getItem('sealedGridCardSize') || '220';
  document.documentElement.style.setProperty('--grid-card-width', savedSize + 'px');
  await fetchCollection();
  fetchSets();
  loadPricesStatus();
})();

async function fetchCollection() {
  statusEl.textContent = 'Loading...';
  const [collRes, statsRes] = await Promise.all([
    fetch('/api/sealed/collection'),
    fetch('/api/sealed/collection/stats'),
  ]);
  allEntries = await collRes.json();
  const stats = await statsRes.json();
  updateStats(stats);
  refilterAndRender();
}

async function fetchSets() {
  const res = await fetch('/api/sealed/products/sets');
  allSets = await res.json();
  allSets.sort((a, b) => a.set_name.localeCompare(b.set_name));
}

function updateStats(stats) {
  const parts = [`${stats.total_entries} entries`, `${stats.total_quantity} items`];
  if (stats.total_cost > 0) parts.push(`$${stats.total_cost.toFixed(2)} invested`);
  if (stats.market_value > 0) {
    parts.push(`$${stats.market_value.toFixed(2)} market value`);
    const gl = stats.gain_loss;
    const sign = gl >= 0 ? '+' : '';
    const cls = gl >= 0 ? 'gain' : 'loss';
    parts.push(`<span class="${cls}">${sign}$${gl.toFixed(2)}</span>`);
  }
  statusEl.innerHTML = parts.join(' · ') + ' ' + pricesStatus.outerHTML;
  // Re-acquire ref after innerHTML replacement
  const newPricesStatus = document.getElementById('prices-status');
  if (newPricesStatus) {
    newPricesStatus.addEventListener('click', onPricesStatusClick);
  }
}

async function loadPricesStatus() {
  try {
    const res = await fetch('/api/sealed/prices-status');
    const data = await res.json();
    if (data.available) {
      const d = new Date(data.last_date + 'T00:00:00');
      const days = Math.floor((Date.now() - d.getTime()) / 86400000);
      pricesStatus.textContent = `Prices: ${days === 0 ? 'today' : days + 'd ago'}`;
    } else {
      pricesStatus.textContent = 'Prices: not loaded';
    }
  } catch {
    pricesStatus.textContent = 'Prices: unavailable';
  }
}

async function onPricesStatusClick() {
  const el = document.getElementById('prices-status');
  if (!el || el.classList.contains('loading')) return;
  el.classList.add('loading');
  el.textContent = 'Prices: fetching...';
  try {
    const res = await fetch('/api/sealed/fetch-prices', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
    const data = await res.json();
    if (data.ok) {
      await fetchCollection();
      await loadPricesStatus();
    } else {
      el.textContent = 'Prices: error';
    }
  } catch {
    el.textContent = 'Prices: error';
  }
  el.classList.remove('loading');
}

// Attach initial click handler
pricesStatus.addEventListener('click', onPricesStatusClick);

// ─── Filters ─────────────────────────────────────────────────────────────────
function initFilters() {
  // Category pills
  const catContainer = document.getElementById('category-pills');
  CATEGORIES.forEach(cat => {
    const id = `cat-${cat}`;
    const label = cat.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    catContainer.innerHTML += `<input type="checkbox" id="${id}" value="${cat}"><label for="${id}">${label}</label>`;
  });

  // Status pills
  const statusContainer = document.getElementById('status-pills');
  STATUSES.forEach(s => {
    const id = `status-${s}`;
    const label = s.charAt(0).toUpperCase() + s.slice(1);
    statusContainer.innerHTML += `<input type="checkbox" id="${id}" value="${s}"><label for="${id}">${label}</label>`;
  });
}

function initEventListeners() {
  // Sidebar toggle
  filterBtn.addEventListener('click', () => {
    sidebar.classList.toggle('open');
    sidebarBackdrop.classList.toggle('active');
  });
  sidebarBackdrop.addEventListener('click', () => {
    sidebar.classList.remove('open');
    sidebarBackdrop.classList.remove('active');
  });

  // Search
  let debounceTimer;
  searchInput.addEventListener('input', () => {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(refilterAndRender, 200);
  });

  // Filter changes
  document.getElementById('category-pills').addEventListener('change', refilterAndRender);
  document.getElementById('status-pills').addEventListener('change', refilterAndRender);
  document.getElementById('price-min').addEventListener('input', refilterAndRender);
  document.getElementById('price-max').addEventListener('input', refilterAndRender);
  document.getElementById('date-min').addEventListener('input', refilterAndRender);
  document.getElementById('date-max').addEventListener('input', refilterAndRender);

  // Clear filters
  document.getElementById('clear-filters-btn').addEventListener('click', () => {
    searchInput.value = '';
    selectedSets.clear();
    setMultiSelect.renderPills();
    document.querySelectorAll('.pill-group input[type="checkbox"]').forEach(cb => cb.checked = false);
    document.getElementById('price-min').value = '';
    document.getElementById('price-max').value = '';
    document.getElementById('date-min').value = '';
    document.getElementById('date-max').value = '';
    refilterAndRender();
  });

  // View toggle
  const gridBtn = document.getElementById('view-grid-btn');
  const tableBtn = document.getElementById('view-table-btn');
  gridBtn.addEventListener('click', () => { viewMode = 'grid'; localStorage.setItem('sealedViewMode', 'grid'); gridBtn.classList.add('active'); tableBtn.classList.remove('active'); render(); });
  tableBtn.addEventListener('click', () => { viewMode = 'table'; localStorage.setItem('sealedViewMode', 'table'); tableBtn.classList.add('active'); gridBtn.classList.remove('active'); render(); });
  if (viewMode === 'table') { tableBtn.classList.add('active'); gridBtn.classList.remove('active'); }

  // Add modal
  addBtn.addEventListener('click', openAddModal);
  document.getElementById('add-close').addEventListener('click', closeAddModal);
  addOverlay.addEventListener('click', e => { if (e.target === addOverlay) closeAddModal(); });

  // TCGPlayer URL lookup
  document.getElementById('tcg-url-btn').addEventListener('click', lookupTcgPlayer);
  document.getElementById('tcg-url-input').addEventListener('keydown', e => { if (e.key === 'Enter') lookupTcgPlayer(); });

  let addDebounce;
  addSearchInput.addEventListener('input', () => {
    clearTimeout(addDebounce);
    addDebounce = setTimeout(searchProducts, 300);
  });

  // Detail modal
  document.getElementById('detail-close').addEventListener('click', closeDetailModal);
  detailOverlay.addEventListener('click', e => { if (e.target === detailOverlay) closeDetailModal(); });

  // Keyboard: Escape closes modals
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      if (detailOverlay.classList.contains('active')) closeDetailModal();
      else if (openOverlay.classList.contains('active')) closeOpenModal();
      else if (addOverlay.classList.contains('active')) closeAddModal();
      else if (colDrawer.classList.contains('open')) {
        toggleColDrawer(false);
      }
      else if (sidebar.classList.contains('open')) {
        sidebar.classList.remove('open');
        sidebarBackdrop.classList.remove('active');
      }
    }
  });
}

// ─── Multi-select component (matches collection.html pattern) ────────────────
function initMultiSelect(config) {
  const searchEl = document.getElementById(config.searchId);
  const dropdownEl = document.getElementById(config.dropdownId);
  const pillsEl = document.getElementById(config.pillsId);

  function renderDropdown(filter) {
    const q = (filter || '').toLowerCase();
    const items = config.getOptions().filter(item => {
      const label = config.getLabel(item).toLowerCase();
      return !q || label.includes(q);
    });
    dropdownEl.innerHTML = '';
    for (const item of items.slice(0, 50)) {
      const li = document.createElement('li');
      const key = config.getKey(item);
      li.textContent = config.getLabel(item);
      if (config.isSelected(key)) li.classList.add('selected');
      li.addEventListener('mousedown', (e) => {
        e.preventDefault();
        config.toggle(key, item);
        renderPills();
        renderDropdown(searchEl.value);
        refilterAndRender();
      });
      dropdownEl.appendChild(li);
    }
  }

  function renderPills() {
    pillsEl.innerHTML = '';
    for (const [key, label] of config.getSelected()) {
      const pill = document.createElement('span');
      pill.className = 'selected-pill';
      pill.innerHTML = `${label} <span class="remove-pill">&times;</span>`;
      pill.querySelector('.remove-pill').addEventListener('click', () => {
        config.remove(key);
        renderPills();
        renderDropdown(searchEl.value);
        refilterAndRender();
      });
      pillsEl.appendChild(pill);
    }
  }

  function positionDropdown() {
    const rect = searchEl.getBoundingClientRect();
    dropdownEl.style.top = rect.bottom + 'px';
    dropdownEl.style.left = rect.left + 'px';
    dropdownEl.style.width = rect.width + 'px';
  }

  searchEl.addEventListener('focus', () => {
    renderDropdown(searchEl.value);
    positionDropdown();
    dropdownEl.classList.add('open');
  });
  searchEl.addEventListener('input', () => {
    renderDropdown(searchEl.value);
    positionDropdown();
    dropdownEl.classList.add('open');
  });
  searchEl.addEventListener('blur', () => {
    setTimeout(() => dropdownEl.classList.remove('open'), 150);
  });

  return { renderPills, renderDropdown };
}

function getSetOptions() {
  const merged = new Map();
  allEntries.forEach(e => {
    if (e.set_code && !merged.has(e.set_code)) {
      merged.set(e.set_code, e.set_name || e.set_code);
    }
  });
  allSets.forEach(s => {
    if (!merged.has(s.set_code)) {
      merged.set(s.set_code, s.set_name || s.set_code);
    }
  });
  return [...merged.entries()]
    .map(([code, name]) => ({ code, name: name || code }))
    .sort((a, b) => a.name.localeCompare(b.name));
}

const setMultiSelect = initMultiSelect({
  searchId: 'set-search',
  dropdownId: 'set-dropdown',
  pillsId: 'set-pills',
  getOptions: getSetOptions,
  getLabel: (item) => `${item.name} (${item.code.toUpperCase()})`,
  getKey: (item) => item.code,
  isSelected: (key) => selectedSets.has(key),
  toggle: (key, item) => {
    if (selectedSets.has(key)) selectedSets.delete(key);
    else selectedSets.set(key, item.name);
  },
  remove: (key) => selectedSets.delete(key),
  getSelected: () => Array.from(selectedSets.entries()).map(([k, v]) => [k, `${v} (${k.toUpperCase()})`]),
});

// ─── Aggregation ─────────────────────────────────────────────────────────────
function buildAggregatedProducts(filteredEntries) {
  const groups = new Map();
  for (const entry of filteredEntries) {
    const key = entry.sealed_product_uuid;
    if (!key) continue;
    let group = groups.get(key);
    if (!group) {
      group = {
        uuid: key,
        name: entry.name,
        set_name: entry.set_name,
        set_code: entry.set_code,
        category: entry.category,
        subtype: entry.subtype,
        release_date: entry.release_date,
        card_count: entry.card_count,
        image_url: entry.image_url,
        contents_json: entry.contents_json,
        tcgplayer_product_id: entry.tcgplayer_product_id,
        purchase_url_tcgplayer: entry.purchase_url_tcgplayer,
        purchase_url_cardkingdom: entry.purchase_url_cardkingdom,
        market_price: entry.market_price,
        low_price: entry.low_price,
        mid_price: entry.mid_price,
        high_price: entry.high_price,
        total_quantity: 0,
        min_cost: null,
        max_cost: null,
        avg_cost: null,
        market_total: null,
        status_counts: {},
        primary_status: null,
        added_at: entry.added_at,
        entries: [],
      };
      groups.set(key, group);
    }
    group.entries.push(entry);
    group.total_quantity += entry.quantity;

    // Track per-unit purchase price for min/max/avg
    if (entry.purchase_price != null) {
      if (group.min_cost == null || entry.purchase_price < group.min_cost) group.min_cost = entry.purchase_price;
      if (group.max_cost == null || entry.purchase_price > group.max_cost) group.max_cost = entry.purchase_price;
    }

    // Status counts
    const s = entry.status || 'owned';
    group.status_counts[s] = (group.status_counts[s] || 0) + entry.quantity;

    // Earliest added_at
    if (entry.added_at && (!group.added_at || entry.added_at < group.added_at)) {
      group.added_at = entry.added_at;
    }
  }

  // Finalize computed fields
  for (const group of groups.values()) {
    // Weighted average cost (weighted by quantity)
    let totalCost = 0, totalCostQty = 0;
    for (const entry of group.entries) {
      if (entry.purchase_price != null) {
        totalCost += entry.purchase_price * entry.quantity;
        totalCostQty += entry.quantity;
      }
    }
    if (totalCostQty > 0) group.avg_cost = totalCost / totalCostQty;

    // Market total
    if (group.market_price != null) {
      group.market_total = group.market_price * group.total_quantity;
    }

    // Primary status = most common
    let maxCount = 0;
    for (const [status, count] of Object.entries(group.status_counts)) {
      if (count > maxCount) { maxCount = count; group.primary_status = status; }
    }
  }

  return Array.from(groups.values());
}

function renderStatusBadges(statusCounts) {
  const statuses = Object.entries(statusCounts);
  if (statuses.length === 1) {
    const [s] = statuses[0];
    return `<span class="disposition-badge ${s}">${s}</span>`;
  }
  return '<span class="status-badges">' +
    statuses.map(([s, n]) => `<span class="disposition-badge ${s}">${n} ${s}</span>`).join('') +
    '</span>';
}

// ─── Filter + Sort + Render ──────────────────────────────────────────────────
function refilterAndRender() {
  const query = searchInput.value.toLowerCase().trim();
  const checkedCats = [...document.querySelectorAll('#category-pills input:checked')].map(c => c.value);
  const checkedStatuses = [...document.querySelectorAll('#status-pills input:checked')].map(c => c.value);
  const priceMin = parseFloat(document.getElementById('price-min').value) || null;
  const priceMax = parseFloat(document.getElementById('price-max').value) || null;
  const dateMin = document.getElementById('date-min').value || null;
  const dateMax = document.getElementById('date-max').value || null;

  allEntriesFiltered = allEntries.filter(e => {
    if (query && !e.name?.toLowerCase().includes(query)) return false;
    if (selectedSets.size && !selectedSets.has(e.set_code)) return false;
    if (checkedCats.length && !checkedCats.includes(e.category)) return false;
    if (checkedStatuses.length && !checkedStatuses.includes(e.status)) return false;
    if (priceMin != null && (e.purchase_price == null || e.purchase_price < priceMin)) return false;
    if (priceMax != null && (e.purchase_price == null || e.purchase_price > priceMax)) return false;
    if (dateMin && (!e.added_at || e.added_at < dateMin)) return false;
    if (dateMax && (!e.added_at || e.added_at > dateMax + 'T99')) return false;
    return true;
  });

  aggregatedProducts = buildAggregatedProducts(allEntriesFiltered);
  applySort();
  render();
}

function applySort() {
  aggregatedProducts.sort((a, b) => {
    let va = a[sortKey], vb = b[sortKey];
    if (va == null && vb == null) return 0;
    if (va == null) return 1;
    if (vb == null) return -1;
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    if (va < vb) return -1 * sortDir;
    if (va > vb) return 1 * sortDir;
    return 0;
  });
}

function handleSortClick(colKey) {
  const dataKey = COL_SORT_MAP[colKey] || colKey;
  if (sortKey === dataKey) {
    sortDir *= -1;
  } else {
    sortKey = dataKey;
    sortDir = (dataKey === 'name' || dataKey === 'set_name') ? 1 : -1;
  }
  applySort();
  render();
}

function render() {
  if (aggregatedProducts.length === 0) {
    if (allEntries.length === 0) {
      mainEl.innerHTML = '<div class="empty-state">No sealed products in your collection yet. Click "+ Add" to get started.</div>';
    } else {
      mainEl.innerHTML = '<div class="empty-state">No entries match your filters.</div>';
    }
    return;
  }

  let html = '';

  if (viewMode === 'grid') {
    // Sort bar only in grid view (table uses clickable <th> headers)
    const visCols = getVisibleColumns();
    html += '<div class="sort-bar">';
    visCols.forEach(col => {
      const dataKey = COL_SORT_MAP[col.key] || col.key;
      const active = sortKey === dataKey;
      const arrow = active ? (sortDir === 1 ? ' \u25B2' : ' \u25BC') : '';
      html += `<span class="sort-btn${active ? ' active' : ''}" data-sort="${col.key}">${col.label}<span class="sort-arrow">${arrow}</span></span>`;
    });
    html += `<span style="flex:1"></span>`;
    html += `<span class="size-slider-wrap"><span>Size</span><input type="range" id="grid-size-slider" min="120" max="400" value="${parseInt(getComputedStyle(document.documentElement).getPropertyValue('--grid-card-width')) || 220}"></span>`;
    html += '</div>';
    html += renderGrid();
  } else {
    html += renderTable();
  }
  mainEl.innerHTML = html;

  // Sort button clicks (grid view)
  mainEl.querySelectorAll('.sort-btn').forEach(btn => {
    btn.addEventListener('click', () => handleSortClick(btn.dataset.sort));
  });

  // Table header sort clicks (table view)
  mainEl.querySelectorAll('th[data-col]').forEach(th => {
    th.addEventListener('click', () => handleSortClick(th.dataset.col));
  });

  // Column config button (table view)
  const colTh = document.getElementById('col-config-th');
  if (colTh) {
    colTh.addEventListener('click', () => toggleColDrawer());
  }

  // Grid size slider
  const slider = document.getElementById('grid-size-slider');
  if (slider) {
    slider.addEventListener('input', () => {
      document.documentElement.style.setProperty('--grid-card-width', slider.value + 'px');
      localStorage.setItem('sealedGridCardSize', slider.value);
    });
  }

  // Card/row clicks open detail modal
  mainEl.querySelectorAll('[data-uuid]').forEach(el => {
    el.addEventListener('click', () => {
      const uuid = el.dataset.uuid;
      const product = aggregatedProducts.find(p => p.uuid === uuid);
      if (product) openDetailModal(product);
    });
  });
}

function formatCategory(entry) {
  const parts = [];
  if (entry.subtype && entry.subtype !== 'default') parts.push(entry.subtype);
  if (entry.category) parts.push(entry.category);
  return parts.join(' ').replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function renderGrid() {
  let html = '<div class="card-grid">';
  aggregatedProducts.forEach(product => {
    const imgHtml = product.image_url
      ? `<img src="${product.image_url}" alt="${esc(product.name)}" loading="lazy">`
      : `<div class="no-image">${esc(product.name || 'Unknown Product')}</div>`;

    const qtyBadge = product.total_quantity > 1 ? `<span class="qty-badge">${product.total_quantity}x</span>` : '';
    const statusBadge = `<span class="status-badge ${product.primary_status}">${product.primary_status}</span>`;
    const costText = product.min_cost != null ? `$${product.min_cost.toFixed(2)}` : '';
    const marketText = product.market_total != null ? `$${product.market_total.toFixed(2)}` : '';

    html += `<div class="sheet-card" data-uuid="${product.uuid}">
      <div class="sheet-card-img-wrap">
        ${imgHtml}
        ${qtyBadge}
        ${statusBadge}
      </div>
      <div class="card-info">
        <div class="card-name">${esc(product.set_name || product.set_code || '')}</div>
        <div class="card-set">${esc(formatCategory(product))}</div>
        ${marketText ? `<div class="market-price">${marketText} mkt</div>` : ''}
        ${costText ? `<div class="card-price">${costText}/ea cost</div>` : ''}
      </div>
    </div>`;
  });
  html += '</div>';
  return html;
}

function renderTable() {
  const visCols = getVisibleColumns();
  const drawerOpen = colDrawer.classList.contains('open');
  const colIcon = `<svg viewBox="0 0 16 16"><path d="M1 1h4v4H1zm5 0h4v4H6zm5 0h4v4H11zM1 6h4v4H1zm5 0h4v4H6zm5 0h4v4H11zM1 11h4v4H1zm5 0h4v4H6zm5 0h4v4H11z"/></svg>`;

  let html = '<table class="sealed-table"><thead><tr>';
  html += `<th class="col-config-th${drawerOpen ? ' active' : ''}" id="col-config-th" title="Configure columns">${colIcon}</th>`;
  for (const col of visCols) {
    if (col.sort === null) {
      html += `<th class="col-image" data-col="${col.key}"></th>`;
      continue;
    }
    const dataKey = COL_SORT_MAP[col.key] || col.key;
    const isActive = sortKey === dataKey;
    const arrow = isActive ? `<span class="sort-arrow">${sortDir === 1 ? '\u25B2' : '\u25BC'}</span>` : '';
    html += `<th class="${isActive ? 'sorted' : ''}" data-col="${col.key}">${col.label}${arrow}</th>`;
  }
  html += '</tr></thead><tbody>';

  aggregatedProducts.forEach(product => {
    const minCost = product.min_cost != null ? `$${product.min_cost.toFixed(2)}` : '';
    const maxCost = product.max_cost != null ? `$${product.max_cost.toFixed(2)}` : '';
    const avgCost = product.avg_cost != null ? `$${product.avg_cost.toFixed(2)}` : '';
    const market = product.market_total != null ? `$${product.market_total.toFixed(2)}` : '';
    const added = product.added_at ? product.added_at.slice(0, 10) : '';

    html += `<tr data-uuid="${product.uuid}">`;
    html += '<td></td>';
    const thumbHtml = product.image_url
      ? `<img class="table-thumb" src="${product.image_url}" alt="" loading="lazy">`
      : '';
    for (const col of visCols) {
      switch (col.key) {
        case 'qty':      html += `<td>${product.total_quantity}</td>`; break;
        case 'image':    html += `<td class="col-image">${thumbHtml}</td>`; break;
        case 'name':     html += `<td>${esc(product.set_name || product.set_code || '')}</td>`; break;
        case 'set':      html += `<td>${esc(formatCategory(product))}</td>`; break;
        case 'min_cost': html += `<td>${minCost}</td>`; break;
        case 'max_cost': html += `<td>${maxCost}</td>`; break;
        case 'avg_cost': html += `<td>${avgCost}</td>`; break;
        case 'market':   html += `<td>${market}</td>`; break;
        case 'added':    html += `<td>${added}</td>`; break;
        case 'status':   html += `<td>${renderStatusBadges(product.status_counts)}</td>`; break;
      }
    }
    html += '</tr>';
  });
  html += '</tbody></table>';
  return html;
}

// ─── Detail Modal ────────────────────────────────────────────────────────────
function openDetailModal(product) {
  const imgPane = document.getElementById('detail-img-pane');
  const detailsPane = document.getElementById('detail-details-pane');

  if (product.image_url) {
    imgPane.innerHTML = `<img src="${product.image_url}" alt="${esc(product.name)}">`;
    imgPane.style.display = '';
  } else {
    imgPane.innerHTML = '';
    imgPane.style.display = 'none';
  }

  const fmtCat = c => c ? c.replace(/_/g, ' ').replace(/\b\w/g, ch => ch.toUpperCase()) : '—';
  const fmtPrice = v => v != null ? `$${v.toFixed(2)}` : '—';

  let html = `<h2>${esc(product.name || 'Unknown Product')}</h2>`;

  // Product info section
  html += `<div class="modal-section">
    <div class="modal-section-title">Product</div>
    <div class="modal-row"><span class="label">Set</span><span class="value">${esc(product.set_name || product.set_code || '—')}</span></div>
    <div class="modal-row"><span class="label">Category</span><span class="value">${fmtCat(product.category)}</span></div>
    ${product.subtype ? `<div class="modal-row"><span class="label">Subtype</span><span class="value">${fmtCat(product.subtype)}</span></div>` : ''}
    ${product.release_date ? `<div class="modal-row"><span class="label">Release</span><span class="value">${product.release_date}</span></div>` : ''}
    ${product.card_count ? `<div class="modal-row"><span class="label">Cards</span><span class="value">${product.card_count}</span></div>` : ''}
    <div class="modal-row"><span class="label">Total Qty</span><span class="value">${product.total_quantity}</span></div>
  </div>`;

  // Cost summary section
  if (product.min_cost != null) {
    html += `<div class="modal-section">
      <div class="modal-section-title">Cost (per unit)</div>
      <div class="modal-row"><span class="label">Min</span><span class="value">${fmtPrice(product.min_cost)}</span></div>
      <div class="modal-row"><span class="label">Max</span><span class="value">${fmtPrice(product.max_cost)}</span></div>
      <div class="modal-row"><span class="label">Avg</span><span class="value">${fmtPrice(product.avg_cost)}</span></div>
    </div>`;
  }

  // Market price section
  if (product.market_price != null) {
    html += `<div class="modal-section">
      <div class="modal-section-title">Market Price</div>
      <div class="modal-row"><span class="label">Total</span><span class="value" style="color:#7ec8e3;font-weight:700">${fmtPrice(product.market_total)}${product.total_quantity > 1 ? ` (${product.total_quantity} × ${fmtPrice(product.market_price)})` : ''}</span></div>
      ${product.low_price != null ? `<div class="modal-row"><span class="label">Low</span><span class="value">${fmtPrice(product.low_price)}</span></div>` : ''}
      ${product.mid_price != null ? `<div class="modal-row"><span class="label">Mid</span><span class="value">${fmtPrice(product.mid_price)}</span></div>` : ''}
      ${product.high_price != null ? `<div class="modal-row"><span class="label">High</span><span class="value">${fmtPrice(product.high_price)}</span></div>` : ''}
    </div>`;
  }

  // Price history placeholder (loaded async)
  if (product.tcgplayer_product_id) {
    html += `<div class="modal-section" id="price-history-section" style="display:none">
      <div class="modal-section-title">Price History</div>
      <div id="price-history-body"></div>
    </div>`;
  }

  // Contents breakdown
  if (product.contents_json) {
    try {
      const contents = typeof product.contents_json === 'string' ? JSON.parse(product.contents_json) : product.contents_json;
      const items = [];
      if (contents.sealed) contents.sealed.forEach(s => items.push(`${s.count || 1}x ${s.name}`));
      if (contents.deck) contents.deck.forEach(d => items.push(`${d.name} deck`));
      if (contents.card) contents.card.forEach(c => items.push(`${c.name}${c.foil ? ' (foil)' : ''}`));
      if (contents.other) contents.other.forEach(o => items.push(o.name));
      if (items.length) {
        html += `<div class="modal-section">
          <div class="modal-section-title">Contents</div>
          <ul class="contents-list">${items.map(i => `<li>${esc(i)}</li>`).join('')}</ul>
        </div>`;
      }
    } catch (e) {}
  }

  // Entries section — one collapsible row per collection entry
  html += `<div class="modal-section">
    <div class="modal-section-title">Entries (${product.entries.length})</div>`;
  product.entries.forEach((entry, idx) => {
    const transitions = VALID_TRANSITIONS[entry.status] || [];
    const costStr = entry.purchase_price != null ? `${entry.quantity} × $${entry.purchase_price.toFixed(2)}` : `${entry.quantity}x`;
    const dateStr = entry.purchase_date || (entry.added_at ? entry.added_at.slice(0, 10) : '');
    const sourceStr = [entry.source, entry.seller_name].filter(Boolean).join(' / ');

    html += `<div class="entry-row">
      <div class="entry-summary">
        <span class="disposition-badge ${entry.status}">${entry.status}</span>
        <span>${costStr}</span>
        ${entry.condition && entry.condition !== 'Near Mint' ? `<span class="entry-detail">${entry.condition}</span>` : ''}
        ${sourceStr ? `<span class="entry-detail">${esc(sourceStr)}</span>` : ''}
        ${dateStr ? `<span class="entry-detail">${dateStr}</span>` : ''}
        <span class="entry-actions">
          <button class="secondary entry-edit-toggle" data-idx="${idx}">Edit</button>
        </span>
      </div>
      <div class="entry-edit-pane" id="entry-edit-${idx}">
        <div class="modal-edit-row"><span class="label">Qty</span><input type="number" class="ee-qty" value="${entry.quantity}" min="1"></div>
        <div class="modal-edit-row"><span class="label">Condition</span><select class="ee-condition">
          ${['Near Mint','Lightly Played','Moderately Played','Heavily Played','Damaged'].map(c =>
            `<option value="${c}" ${entry.condition === c ? 'selected' : ''}>${c}</option>`
          ).join('')}
        </select></div>
        <div class="modal-edit-row"><span class="label">Price</span><input type="number" class="ee-price" value="${entry.purchase_price ?? ''}" min="0" step="0.01" placeholder="0.00"></div>
        <div class="modal-edit-row"><span class="label">Date</span><input type="date" class="ee-date" value="${entry.purchase_date || ''}"></div>
        <div class="modal-edit-row"><span class="label">Source</span><input type="text" class="ee-source" value="${esc(entry.source || '')}" placeholder="e.g. TCGPlayer, LGS"></div>
        <div class="modal-edit-row"><span class="label">Seller</span><input type="text" class="ee-seller" value="${esc(entry.seller_name || '')}" placeholder="Store name"></div>
        <div class="modal-edit-row"><span class="label">Notes</span><textarea class="ee-notes" rows="2" placeholder="Optional notes">${esc(entry.notes || '')}</textarea></div>
        ${entry.sale_price != null ? `<div class="modal-row"><span class="label">Sale Price</span><span class="value">$${entry.sale_price.toFixed(2)}</span></div>` : ''}
        <div class="entry-edit-actions">
          <button class="entry-save-btn" data-entry-id="${entry.id}" data-idx="${idx}">Save</button>
          ${transitions.length > 0 ? `
            <select class="ee-dispose-status">${transitions.map(t => `<option value="${t}">${t}</option>`).join('')}</select>
            <input type="number" class="ee-dispose-price" placeholder="Sale $" min="0" step="0.01" style="width:70px">
            <button class="dispose-btn entry-dispose-btn" data-entry-id="${entry.id}" data-idx="${idx}">Dispose</button>
          ` : ''}
          <button class="delete-btn entry-delete-btn" data-entry-id="${entry.id}">Delete</button>
        </div>
      </div>
    </div>`;
  });
  html += '</div>';

  // Links
  const links = [];
  if (product.purchase_url_tcgplayer) links.push(`<a class="badge link" href="${product.purchase_url_tcgplayer}" target="_blank" rel="noopener">TCGPlayer</a>`);
  if (product.purchase_url_cardkingdom) links.push(`<a class="badge link" href="${product.purchase_url_cardkingdom}" target="_blank" rel="noopener">Card Kingdom</a>`);
  if (links.length) {
    html += `<div class="modal-section"><div class="modal-section-title">Links</div><div class="modal-links">${links.join('')}</div></div>`;
  }

  detailsPane.innerHTML = html;
  detailOverlay.classList.add('active');

  // Load price history async
  if (product.tcgplayer_product_id) {
    fetch(`/api/sealed/prices/${product.tcgplayer_product_id}`)
      .then(r => r.json())
      .then(prices => {
        const section = document.getElementById('price-history-section');
        const body = document.getElementById('price-history-body');
        if (!section || !body || !prices.length) return;
        let tbl = '<table class="price-history-table"><thead><tr><th>Date</th><th>Low</th><th>Mid</th><th>Market</th><th>High</th></tr></thead><tbody>';
        prices.forEach(p => {
          const fmt = v => v != null ? `$${v.toFixed(2)}` : '—';
          tbl += `<tr><td>${p.observed_at}</td><td>${fmt(p.low_price)}</td><td>${fmt(p.mid_price)}</td><td>${fmt(p.market_price)}</td><td>${fmt(p.high_price)}</td></tr>`;
        });
        tbl += '</tbody></table>';
        body.innerHTML = tbl;
        section.style.display = '';
      })
      .catch(() => {});
  }

  // Edit toggle handlers
  detailsPane.querySelectorAll('.entry-edit-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const pane = document.getElementById(`entry-edit-${btn.dataset.idx}`);
      if (pane) {
        pane.classList.toggle('open');
        btn.textContent = pane.classList.contains('open') ? 'Close' : 'Edit';
      }
    });
  });

  // Save handlers per entry
  detailsPane.querySelectorAll('.entry-save-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = parseInt(btn.dataset.entryId);
      const pane = document.getElementById(`entry-edit-${btn.dataset.idx}`);
      const body = {
        quantity: parseInt(pane.querySelector('.ee-qty').value) || 1,
        condition: pane.querySelector('.ee-condition').value,
        purchase_price: parseFloat(pane.querySelector('.ee-price').value) || null,
        purchase_date: pane.querySelector('.ee-date').value || null,
        source: pane.querySelector('.ee-source').value || null,
        seller_name: pane.querySelector('.ee-seller').value || null,
        notes: pane.querySelector('.ee-notes').value || null,
      };
      const res = await fetch(`/api/sealed/collection/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (res.ok) {
        closeDetailModal();
        await fetchCollection();
      }
    });
  });

  // Dispose handlers per entry
  detailsPane.querySelectorAll('.entry-dispose-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = parseInt(btn.dataset.entryId);
      const pane = document.getElementById(`entry-edit-${btn.dataset.idx}`);
      const body = { new_status: pane.querySelector('.ee-dispose-status').value };
      const salePrice = parseFloat(pane.querySelector('.ee-dispose-price').value);
      if (!isNaN(salePrice)) body.sale_price = salePrice;
      const res = await fetch(`/api/sealed/collection/${id}/dispose`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      if (res.ok) {
        closeDetailModal();
        await fetchCollection();
      }
    });
  });

  // Delete handlers per entry
  detailsPane.querySelectorAll('.entry-delete-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm('Delete this sealed collection entry? This cannot be undone.')) return;
      const id = parseInt(btn.dataset.entryId);
      const res = await fetch(`/api/sealed/collection/${id}?confirm=true`, { method: 'DELETE' });
      if (res.ok) {
        closeDetailModal();
        await fetchCollection();
      }
    });
  });
}

function closeDetailModal() {
  detailOverlay.classList.remove('active');
}

// ─── Add Modal ───────────────────────────────────────────────────────────────
let selectedProduct = null;

function openAddModal() {
  selectedProduct = null;
  addSearchInput.value = '';
  document.getElementById('tcg-url-input').value = '';
  productResults.innerHTML = '';
  addBody.innerHTML = '<ul class="product-results" id="product-results"></ul>';
  addOverlay.classList.add('active');
  setTimeout(() => addSearchInput.focus(), 100);
}

function closeAddModal() {
  addOverlay.classList.remove('active');
}

async function lookupTcgPlayer() {
  const input = document.getElementById('tcg-url-input');
  const raw = input.value.trim();
  if (!raw) return;

  const res = await fetch('/api/sealed/from-tcgplayer', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ url: raw }),
  });
  const data = await res.json();
  if (!res.ok) {
    input.style.borderColor = '#e87e7e';
    setTimeout(() => { input.style.borderColor = ''; }, 2000);
    return;
  }
  // Found a product — show the add form
  showAddForm(data);
}

async function searchProducts() {
  const q = addSearchInput.value.trim();
  if (q.length < 2) {
    document.getElementById('product-results').innerHTML = '';
    return;
  }
  const res = await fetch(`/api/sealed/products?q=${encodeURIComponent(q)}&limit=20`);
  const products = await res.json();
  const resultsEl = document.getElementById('product-results');
  if (!resultsEl) return;

  resultsEl.innerHTML = products.map(p => {
    const imgSrc = p.image_url || '';
    const cat = p.category ? p.category.replace(/_/g, ' ') : '';
    return `<li data-uuid="${p.uuid}">
      ${imgSrc ? `<img src="${imgSrc}" alt="">` : `<div style="width:48px;height:48px;background:#0a0a1a;border-radius:4px;flex-shrink:0"></div>`}
      <div class="product-info">
        <div class="product-name">${esc(p.name)}</div>
        <div class="product-meta">${esc(p.set_name || p.set_code)} · ${cat}</div>
      </div>
    </li>`;
  }).join('');

  resultsEl.querySelectorAll('li').forEach(li => {
    li.addEventListener('click', () => {
      const uuid = li.dataset.uuid;
      const product = products.find(p => p.uuid === uuid);
      if (product) showAddForm(product);
    });
  });
}

function showAddForm(product) {
  selectedProduct = product;
  const imgSrc = product.image_url || '';
  const cat = product.category ? product.category.replace(/_/g, ' ') : '';

  addBody.innerHTML = `<div class="add-form">
    <div class="selected-product">
      ${imgSrc ? `<img src="${imgSrc}" alt="">` : ''}
      <div>
        <div class="product-name">${esc(product.name)}</div>
        <div class="product-meta">${esc(product.set_name || product.set_code)} · ${cat}</div>
      </div>
      <button class="secondary change-btn" id="change-product-btn">Change</button>
    </div>
    <div class="form-row"><label>Quantity</label><input type="number" id="add-qty" value="1" min="1"></div>
    <div class="form-row"><label>Condition</label><select id="add-condition">
      <option value="Near Mint" selected>Near Mint</option>
      <option value="Lightly Played">Lightly Played</option>
      <option value="Moderately Played">Moderately Played</option>
      <option value="Heavily Played">Heavily Played</option>
      <option value="Damaged">Damaged</option>
    </select></div>
    <div class="form-row"><label>Price</label><input type="number" id="add-price" placeholder="Total purchase price" min="0" step="0.01"></div>
    <div class="form-row"><label>Date</label><input type="date" id="add-date" value="${new Date().toISOString().slice(0, 10)}"></div>
    <div class="form-row"><label>Source</label><input type="text" id="add-source" placeholder="e.g. TCGPlayer, LGS, Amazon"></div>
    <div class="form-row"><label>Seller</label><input type="text" id="add-seller" placeholder="Store or seller name"></div>
    <div class="form-row"><label>Notes</label><textarea id="add-notes" rows="2" placeholder="Optional notes"></textarea></div>
    <div class="form-actions">
      <button class="secondary" id="cancel-add-btn">Cancel</button>
      <button id="confirm-add-btn">Add to Collection</button>
    </div>
  </div>`;

  document.getElementById('change-product-btn').addEventListener('click', () => {
    selectedProduct = null;
    addBody.innerHTML = '<ul class="product-results" id="product-results"></ul>';
    addSearchInput.value = '';
    addSearchInput.focus();
  });

  document.getElementById('cancel-add-btn').addEventListener('click', closeAddModal);

  document.getElementById('confirm-add-btn').addEventListener('click', async () => {
    const body = {
      sealed_product_uuid: product.uuid,
      quantity: parseInt(document.getElementById('add-qty').value) || 1,
      condition: document.getElementById('add-condition').value,
    };
    const price = parseFloat(document.getElementById('add-price').value);
    if (!isNaN(price)) body.purchase_price = price;
    const date = document.getElementById('add-date').value;
    if (date) body.purchase_date = date;
    const source = document.getElementById('add-source').value.trim();
    if (source) body.source = source;
    const seller = document.getElementById('add-seller').value.trim();
    if (seller) body.seller_name = seller;
    const notes = document.getElementById('add-notes').value.trim();
    if (notes) body.notes = notes;

    const res = await fetch('/api/sealed/collection', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (res.ok) {
      closeAddModal();
      await fetchCollection();
    }
  });
}

// ─── Open Product Modal ──────────────────────────────────────────────────────
const openBtn = document.getElementById('open-btn');
const openOverlay = document.getElementById('open-modal-overlay');
const openSearchInput = document.getElementById('open-search-input');
const openBody = document.getElementById('open-modal-body');

function openOpenModal() {
  openSearchInput.value = '';
  openBody.innerHTML = '<ul class="product-results" id="open-product-results"></ul>';
  document.getElementById('open-modal-title').textContent = 'Open Sealed Product';
  openOverlay.classList.add('active');
  setTimeout(() => openSearchInput.focus(), 100);
}

function closeOpenModal() {
  openOverlay.classList.remove('active');
}

openBtn.addEventListener('click', openOpenModal);
document.getElementById('open-close').addEventListener('click', closeOpenModal);
openOverlay.addEventListener('click', e => { if (e.target === openOverlay) closeOpenModal(); });

let openDebounce;
openSearchInput.addEventListener('input', () => {
  clearTimeout(openDebounce);
  openDebounce = setTimeout(searchProductsForOpen, 300);
});

async function searchProductsForOpen() {
  const q = openSearchInput.value.trim();
  if (q.length < 2) {
    document.getElementById('open-product-results').innerHTML = '';
    return;
  }
  const res = await fetch(`/api/sealed/products?q=${encodeURIComponent(q)}&limit=20`);
  const products = await res.json();
  const resultsEl = document.getElementById('open-product-results');
  if (!resultsEl) return;

  resultsEl.innerHTML = products.map(p => {
    const imgSrc = p.image_url || '';
    const cat = p.category ? p.category.replace(/_/g, ' ') : '';
    const badge = p.has_contents
      ? ''
      : '<span class="no-contents-badge">No contents data</span>';
    return `<li data-uuid="${p.uuid}" ${!p.has_contents ? 'style="opacity:0.5"' : ''}>
      ${imgSrc ? `<img src="${imgSrc}" alt="">` : `<div style="width:48px;height:48px;background:#0a0a1a;border-radius:4px;flex-shrink:0"></div>`}
      <div class="product-info">
        <div class="product-name">${esc(p.name)}${badge}</div>
        <div class="product-meta">${esc(p.set_name || p.set_code)} · ${cat}</div>
      </div>
    </li>`;
  }).join('');

  resultsEl.querySelectorAll('li').forEach(li => {
    li.addEventListener('click', async () => {
      const uuid = li.dataset.uuid;
      const product = products.find(p => p.uuid === uuid);
      if (!product || !product.has_contents) return;
      await showOpenPreview(product);
    });
  });
}

async function showOpenPreview(product) {
  document.getElementById('open-modal-title').textContent = `Open: ${product.name}`;
  openSearchInput.style.display = 'none';
  openBody.innerHTML = '<div class="open-preview"><p style="color:#888">Loading contents...</p></div>';

  const res = await fetch(`/api/sealed/products/${product.uuid}/contents`);
  const data = await res.json();

  if (!res.ok || !data.openable) {
    openBody.innerHTML = `<div class="open-preview"><p style="color:#e87e7e">Cannot open this product: ${data.error || 'no resolvable cards'}</p>
      <div class="form-actions"><button class="secondary" id="open-back-btn">Back</button></div></div>`;
    document.getElementById('open-back-btn').addEventListener('click', resetOpenModal);
    return;
  }

  // Group cards by source_name
  const groups = {};
  for (const card of data.cards) {
    const key = card.source_name || 'Direct';
    if (!groups[key]) groups[key] = [];
    groups[key].push(card);
  }

  let cardsHtml = '';
  for (const [groupName, cards] of Object.entries(groups)) {
    cardsHtml += `<h3>${esc(groupName)} (${cards.reduce((s, c) => s + c.quantity, 0)} cards)</h3>`;
    cardsHtml += `<div class="card-list"><table>
      <thead><tr><th>Card</th><th>Set</th><th>Qty</th><th>Finish</th></tr></thead><tbody>`;
    for (const c of cards) {
      cardsHtml += `<tr>
        <td>${esc(c.name || 'Unknown')}</td>
        <td>${esc((c.set_code || '').toUpperCase())} ${esc(c.collector_number || '')}</td>
        <td>${c.quantity}</td>
        <td>${c.is_foil ? 'Foil' : 'Nonfoil'}</td>
      </tr>`;
    }
    cardsHtml += '</tbody></table></div>';
  }

  let badgesHtml = `<span class="badge info">${data.total_cards} cards to add</span>`;
  if (data.unresolvable.length > 0) {
    badgesHtml += `<span class="badge warn">${data.unresolvable.length} unresolvable</span>`;
  }
  if (data.sealed_sub_products.length > 0) {
    const subCount = data.sealed_sub_products.reduce((s, p) => s + p.count, 0);
    badgesHtml += `<span class="badge info">${subCount} sealed sub-products</span>`;
  }
  if (data.other_items.length > 0) {
    badgesHtml += `<span class="badge">${data.other_items.length} other items (skipped)</span>`;
  }

  let subProductsHtml = '';
  if (data.sealed_sub_products.length > 0) {
    subProductsHtml = '<h3>Sealed Sub-Products (added to sealed collection)</h3><ul style="list-style:disc;padding-left:20px;font-size:0.85rem;color:#bbb">';
    for (const sp of data.sealed_sub_products) {
      const status = sp.found_in_catalog ? '' : ' <span style="color:#888">(not in catalog)</span>';
      subProductsHtml += `<li>${sp.count}x ${esc(sp.name)}${status}</li>`;
    }
    subProductsHtml += '</ul>';
  }

  openBody.innerHTML = `<div class="open-preview">
    <div class="card-summary">${badgesHtml}</div>
    ${cardsHtml}
    ${subProductsHtml}
    <div class="open-options">
      <div class="form-row">
        <label>Condition</label>
        <select id="open-condition">
          <option value="Near Mint" selected>Near Mint</option>
          <option value="Lightly Played">Lightly Played</option>
          <option value="Moderately Played">Moderately Played</option>
          <option value="Heavily Played">Heavily Played</option>
          <option value="Damaged">Damaged</option>
        </select>
      </div>
      <div class="form-row">
        <label>Track product</label>
        <input type="checkbox" id="open-track"> <span style="font-size:0.82rem;color:#aaa">Add to sealed collection as "opened"</span>
      </div>
      <div class="form-row" id="open-price-row" style="display:none">
        <label>Purchase price</label>
        <input type="number" id="open-price" placeholder="Purchase price" min="0" step="0.01">
      </div>
      <div class="form-row" id="open-date-row" style="display:none">
        <label>Purchase date</label>
        <input type="date" id="open-date" value="${new Date().toISOString().slice(0, 10)}">
      </div>
    </div>
    <div class="form-actions">
      <button class="secondary" id="open-back-btn">Back</button>
      <button id="open-confirm-btn">Open & Add ${data.total_cards} Cards</button>
    </div>
  </div>`;

  // Toggle price/date fields when track checkbox changes
  document.getElementById('open-track').addEventListener('change', function() {
    document.getElementById('open-price-row').style.display = this.checked ? 'flex' : 'none';
    document.getElementById('open-date-row').style.display = this.checked ? 'flex' : 'none';
  });

  document.getElementById('open-back-btn').addEventListener('click', resetOpenModal);

  document.getElementById('open-confirm-btn').addEventListener('click', async () => {
    const btn = document.getElementById('open-confirm-btn');
    btn.disabled = true;
    btn.textContent = 'Opening...';

    const body = {
      sealed_product_uuid: product.uuid,
      condition: document.getElementById('open-condition').value,
      track_in_sealed: document.getElementById('open-track').checked,
    };
    const price = parseFloat(document.getElementById('open-price')?.value);
    if (!isNaN(price)) body.purchase_price = price;
    const date = document.getElementById('open-date')?.value;
    if (date) body.purchase_date = date;

    const openRes = await fetch('/api/sealed/open', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const result = await openRes.json();

    if (openRes.ok) {
      closeOpenModal();
      await fetchCollection();
      // Brief toast-like feedback
      statusEl.innerHTML = `Added ${result.cards_added} cards from ${esc(product.name)}`;
      setTimeout(() => fetchCollection(), 2000);
    } else {
      btn.disabled = false;
      btn.textContent = `Open & Add ${data.total_cards} Cards`;
      alert(result.error || 'Failed to open product');
    }
  });
}

function resetOpenModal() {
  openSearchInput.style.display = '';
  openSearchInput.value = '';
  document.getElementById('open-modal-title').textContent = 'Open Sealed Product';
  openBody.innerHTML = '<ul class="product-results" id="open-product-results"></ul>';
  openSearchInput.focus();
}

// ─── Helpers ─────────────────────────────────────────────────────────────────
function esc(str) {
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}
</script>
