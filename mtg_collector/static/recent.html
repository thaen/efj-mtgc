<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="icon" href="/static/favicon.ico" type="image/x-icon">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Recent Images - Card Ingest</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/keyrune@latest/css/keyrune.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  color: #e0e0e0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  min-height: 100vh;
}
header {
  background: #16213e;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  border-bottom: 2px solid #0f3460;
}
header h1 { font-size: 1.1rem; color: #e94560; }
header a { color: #888; text-decoration: none; font-size: 0.8rem; }
header a:hover { color: #e94560; }

.controls {
  margin: 12px;
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.controls label { font-size: 0.8rem; color: #888; }
.pill-row { display: flex; gap: 0; }
.pill-row .pill {
  padding: 5px 12px;
  border: 1px solid #0f3460;
  background: #16213e;
  color: #888;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  user-select: none;
}
.pill-row .pill:first-child { border-radius: 6px 0 0 6px; }
.pill-row .pill:last-child { border-radius: 0 6px 6px 0; }
.pill-row .pill + .pill { border-left: none; }
.pill-row .pill.active { background: #e94560; border-color: #e94560; color: #fff; }
.pill-row .pill:hover:not(.active) { border-color: #e94560; color: #e0e0e0; }

.col-controls {
  display: flex;
  align-items: center;
  gap: 0;
}
.col-btn {
  width: 28px; height: 28px;
  border: 1px solid #0f3460;
  background: #16213e;
  color: #888;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  user-select: none;
}
.col-btn:first-child { border-radius: 6px 0 0 6px; }
.col-btn:last-child { border-radius: 0 6px 6px 0; }
.col-btn + .col-btn { border-left: none; }
.col-btn:hover { border-color: #e94560; color: #e0e0e0; }
.col-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.col-count {
  width: 28px; height: 28px;
  border: 1px solid #0f3460; border-left: none; border-right: none;
  background: #16213e;
  color: #e0e0e0;
  font-size: 0.8rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
}

.right-controls {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
}
#batch-msg {
  font-size: 0.8rem;
  color: #4caf50;
}
#batch-msg a { color: #e94560; }
#batch-btn {
  padding: 6px 16px;
  background: #4caf50;
  color: #fff;
  border: none;
  border-radius: 6px;
  font-weight: 600;
  font-size: 0.85rem;
  cursor: pointer;
  display: none;
}
#batch-btn:hover { background: #3d8b40; }
#batch-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.summary {
  margin: 0 12px 8px;
  font-size: 0.8rem;
  color: #888;
}

#grid {
  margin: 0 12px 12px;
  display: grid;
  grid-template-columns: repeat(var(--grid-cols, 6), 1fr);
  gap: 10px;
}

.img-card {
  display: block;
  color: inherit;
  text-decoration: none;
  background: #16213e;
  border: 3px solid #0f3460;
  border-radius: 8px;
  overflow: hidden;
  position: relative;
  transition: border-color 0.2s;
}
.img-card.processing { border-color: #888; }
.img-card.done { border-color: #4caf50; }
.img-card.needs_disambiguation { border-color: #e94560; }
.img-card.error { border-color: #e94560; }

.img-card img {
  width: 100%;
  aspect-ratio: 4 / 5;
  object-fit: cover;
  display: block;
}
/* Foil shimmer overlay (positioned over the photo) */
.img-card .foil-shimmer {
  display: none;
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  aspect-ratio: 4 / 5;
  pointer-events: none;
  z-index: 1;
}
.img-card img.foil ~ .foil-shimmer { display: block; }
.img-card .foil-shimmer::before {
  content: "";
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: repeating-linear-gradient(
    135deg,
    rgba(255,0,0,0.08),
    rgba(255,165,0,0.08) 5%,
    rgba(255,255,0,0.08) 10%,
    rgba(0,200,0,0.08) 15%,
    rgba(0,140,255,0.08) 20%,
    rgba(130,0,255,0.08) 25%,
    rgba(255,0,200,0.08) 30%,
    rgba(255,0,0,0.08) 33.33%
  );
  mix-blend-mode: color;
  pointer-events: none;
}
.img-card .foil-shimmer::after {
  content: "";
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background:
    linear-gradient(135deg, transparent 46%, rgba(255,255,255,0.12) 49%, rgba(255,255,255,0.12) 51%, transparent 54%)
    100% 100% / 240% 240%;
  pointer-events: none;
  animation: foil-streak 3s ease-in-out infinite;
}
@keyframes foil-streak {
  0% { background-position: 100% 100%; }
  15%, 100% { background-position: 0 0; }
}
.img-card .set-overlay {
  position: absolute;
  bottom: 30px;
  left: 6px;
  font-size: 2rem;
  color: #fff;
  filter: drop-shadow(0 1px 3px rgba(0,0,0,0.8));
  pointer-events: none;
  z-index: 1;
}
.img-card .finish-overlay {
  position: absolute;
  bottom: 30px;
  right: 6px;
  background: rgba(0,0,0,0.7);
  color: #ddd;
  font-size: 0.95rem;
  font-weight: 600;
  padding: 3px 7px;
  border-radius: 3px;
  pointer-events: none;
  z-index: 1;
  text-transform: capitalize;
}
.img-card .finish-badges {
  position: absolute;
  bottom: 30px;
  right: 6px;
  display: flex;
  gap: 3px;
  z-index: 2;
}
.img-card .finish-badge {
  background: rgba(0,0,0,0.7);
  color: #ddd;
  font-size: 0.95rem;
  font-weight: 600;
  padding: 3px 7px;
  border-radius: 3px;
  cursor: pointer;
  text-transform: capitalize;
  border: 1px solid transparent;
}
.img-card .finish-badge:hover { border-color: #e94560; color: #fff; }
.img-card .finish-badge.active { border-color: #4caf50; background: rgba(76,175,80,0.3); color: #fff; }
.img-card .card-title {
  text-align: center;
  font-weight: 700;
  color: #fff;
  font-size: 0.75rem;
  padding: 5px 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.img-card .error-icon {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 2rem;
  color: #c62828;
  text-shadow: 0 0 8px rgba(0,0,0,0.8);
  pointer-events: none;
}

.spinner-icon {
  display: inline-block;
  width: 10px; height: 10px;
  border: 2px solid #555;
  border-top-color: #e94560;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  vertical-align: middle;
  margin-right: 3px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.empty-state {
  text-align: center;
  padding: 60px 24px;
  color: #555;
}
.empty-state h2 { color: #888; margin-bottom: 8px; }

/* Error tooltip */
.img-card .error-tooltip {
  display: none;
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(30,0,0,0.95);
  color: #e94560;
  font-size: 0.65rem;
  padding: 6px;
  max-height: 80px;
  overflow-y: auto;
  word-break: break-word;
}
.img-card.error:hover .error-tooltip { display: block; }
.img-card { cursor: pointer; }
.img-card.done:hover { border-color: #66bb6a; }
.img-card.needs_disambiguation:hover { border-color: #f06080; }
.img-card.error:hover { border-color: #f06080; }
.img-card.selected {
  border-color: #fff;
  box-shadow: 0 0 12px rgba(255, 255, 255, 0.4);
  overflow: visible;
  z-index: 1;
}
.img-card.selected::after {
  content: '';
  position: absolute;
  bottom: -10px;
  left: 50%;
  transform: translateX(-50%);
  border-left: 10px solid transparent;
  border-right: 10px solid transparent;
  border-top: 10px solid #fff;
  z-index: 2;
}

.accordion-content {
  display: none;
  grid-column: 1 / -1;
  background: #1a2744;
  border: 2px solid #fff;
  border-radius: 8px;
  padding: 12px;
  min-height: 60px;
  color: #ccc;
  font-size: 0.85rem;
}
.accordion-content.open { display: block; }

/* Accordion inline content */
.accordion-content button {
  padding: 6px 14px;
  border: 1px solid #e94560;
  border-radius: 6px;
  background: #e94560;
  color: #fff;
  font-weight: 600;
  cursor: pointer;
  font-size: 0.8rem;
}
.accordion-content button:hover { background: #c73651; }
.accordion-content button:disabled { opacity: 0.5; cursor: not-allowed; }
.accordion-content button.secondary { background: #333; border-color: #555; }
.accordion-content button.secondary:hover { background: #444; }
.accordion-content button.danger { background: #c62828; border-color: #c62828; }
.accordion-content button.danger:hover { background: #a31515; }

.acc-layout {
  display: flex;
  gap: 16px;
  align-items: flex-start;
  flex-wrap: wrap;
}
.acc-sidebar {
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex-shrink: 0;
  min-width: 160px;
}
.acc-sidebar .card-title {
  font-weight: 600;
  color: #e94560;
  font-size: 0.95rem;
}
.acc-sidebar input {
  width: 100%;
  padding: 6px 8px;
  border-radius: 4px;
  border: 1px solid #0f3460;
  background: #0d1117;
  color: #e0e0e0;
  font-size: 0.8rem;
}
.acc-main {
  flex: 1;
  min-width: 0;
}

.acc-candidates {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.acc-candidate {
  width: 150px;
  flex-shrink: 0;
  border: 2px solid transparent;
  border-radius: 5px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  position: relative;
  padding: 2px;
}
.acc-candidate:hover { background: #1a1a3e; border-color: #0f3460; }
.acc-candidate.selected { border-color: #4caf50; background: #1a1a3e; }
.acc-candidate img {
  width: 100%;
  aspect-ratio: 63 / 44;
  object-fit: cover;
  object-position: top center;
  border-radius: 3px;
  display: block;
}
.acc-candidate .card-img-wrap {
  position: relative;
}
.acc-candidate .set-overlay {
  position: absolute;
  bottom: 4px;
  left: 4px;
  font-size: 1.4rem;
  color: #fff;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,1.0));
  pointer-events: none;
  
  paint-order: stroke fill;
}
.acc-candidate .set-overlay.ss-grad::before {
  -webkit-text-fill-color: currentColor;
}
.acc-candidate .set-overlay.ss-common {
  
}
.acc-candidate .cn-overlay {
  position: absolute;
  bottom: 4px;
  left: 28px;
  font-size: 0.95rem;
  font-weight: 600;
  color: #ddd;
  background: rgba(0,0,0,0.7);
  padding: 2px 6px;
  border-radius: 3px;
  pointer-events: none;
}
.acc-candidate .finish-overlay {
  position: absolute;
  bottom: 4px;
  right: 4px;
  background: rgba(0,0,0,0.7);
  color: #ddd;
  font-size: 0.95rem;
  font-weight: 600;
  padding: 3px 7px;
  border-radius: 3px;
  pointer-events: none;
  text-transform: capitalize;
}

.accordion-content .agent-trace {
  display: none;
  margin-top: 10px;
  border: 1px solid #0f3460;
  border-radius: 6px;
  overflow: hidden;
}
.accordion-content .agent-trace.visible {
  display: block;
}
.acc-sidebar .btn-row {
  display: flex;
  gap: 6px;
}
.acc-sidebar .btn-row > button { flex: 1; }
.acc-sidebar .trace-toggle {
  background: #333;
  border: 1px solid #555;
  color: #888;
  border-radius: 6px;
  padding: 6px 14px;
  font-size: 0.8rem;
  cursor: pointer;
  font-weight: 600;
}
.acc-sidebar .trace-toggle:hover { background: #444; color: #e0e0e0; }
.accordion-content .trace-lines {
  padding: 6px 10px;
  background: #0a0a14;
  font-family: monospace;
  font-size: 0.65rem;
  line-height: 1.4;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 240px;
  overflow-y: auto;
}
.accordion-content .trace-lines .tl-ocr    { color: #666; }
.accordion-content .trace-lines .tl-agent  { color: #7ec8e3; }
.accordion-content .trace-lines .tl-tool   { color: #f0ad4e; }
.accordion-content .trace-lines .tl-result { color: #888; }
.accordion-content .trace-lines .tl-final  { color: #4caf50; }


#usage-box {
  margin-left: auto;
  font-size: 0.7rem;
  color: #666;
  text-align: right;
  line-height: 1.6;
  white-space: nowrap;
}
#usage-box .usage-cost {
  color: #e0e0e0;
  font-weight: 600;
  font-size: 0.8rem;
}
</style>
</head>
<body>

<header>
  <h1><a href="/" style="color:inherit;text-decoration:none">Recent Images</a></h1>
  <a href="/">Home</a>
  <a href="/upload">Upload</a>
  <a href="/disambiguate">Disambiguate</a>
  <div id="usage-box"></div>
</header>

<div class="controls">
  <label>Time window:</label>
  <div class="pill-row" id="time-pills">
    <div class="pill" data-hours="0.5">30m</div>
    <div class="pill active" data-hours="2">2h</div>
    <div class="pill" data-hours="4">4h</div>
    <div class="pill" data-hours="12">12h</div>
    <div class="pill" data-hours="24">24h</div>
  </div>
  <label>Columns:</label>
  <div class="col-controls">
    <button class="col-btn" id="col-minus">&minus;</button>
    <div class="col-count" id="col-count"></div>
    <button class="col-btn" id="col-plus">+</button>
  </div>
  <div class="right-controls">
    <span id="batch-msg"></span>
    <button id="batch-btn" onclick="batchIngest()">Batch Ingest</button>
  </div>
</div>

<div class="summary" id="summary"></div>
<div id="grid"></div>
<div id="empty" class="empty-state" style="display:none">
  <h2>No recent images</h2>
  <p><a href="/upload" style="color:#e94560">Upload some photos</a></p>
</div>

<script>
let currentHours = 2;
const activePolls = new Map(); // image_id (number) → intervalId
let discoveryTimer = null;

// ── Column count ─────────────────────────────────────────────────────────────

const MIN_COLS = 1;
const MAX_COLS = 12;
let gridCols = window.innerWidth < 600 ? 2 : 6;

function applyGridCols() {
  document.getElementById('grid').style.setProperty('--grid-cols', gridCols);
  document.getElementById('col-count').textContent = gridCols;
  document.getElementById('col-minus').disabled = gridCols <= MIN_COLS;
  document.getElementById('col-plus').disabled = gridCols >= MAX_COLS;
}

document.getElementById('col-minus').addEventListener('click', () => {
  if (gridCols > MIN_COLS) { gridCols--; applyGridCols(); repositionAccordion(); }
});
document.getElementById('col-plus').addEventListener('click', () => {
  if (gridCols < MAX_COLS) { gridCols++; applyGridCols(); repositionAccordion(); }
});

applyGridCols();

// ── Time pills ───────────────────────────────────────────────────────────────

document.querySelectorAll('#time-pills .pill').forEach(pill => {
  pill.addEventListener('click', () => {
    document.querySelectorAll('#time-pills .pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    currentHours = parseFloat(pill.dataset.hours);
    loadRecent();
    loadUsageStats();
  });
});

// ── Rendering helpers ────────────────────────────────────────────────────────

const KEYRUNE_FALLBACKS = {
  tsb: 'tsp', pspm: 'spm', cst: 'csp',
};
function keyruneSetCode(code) {
  const lc = (code || '').toLowerCase();
  return KEYRUNE_FALLBACKS[lc] || lc;
}

function buildCardOverlays(img) {
  const cards = img.cards || [];
  let setHtml = '';
  let finishHtml = '';
  let titleHtml = '';
  let isFoil = false;
  if (cards.length) {
    const c = cards[0];
    const resolved = img.border_status === 'done';
    const hasFinishBadges = c.finish_options && c.finish_options.length >= 1;
    const finishResolved = hasFinishBadges && c.finish_printing_id;
    if ((resolved || finishResolved) && c.set_code) {
      const sc = keyruneSetCode(c.set_code.toLowerCase());
      setHtml = `<i class="ss ss-${sc} set-overlay" title="${escapeHtml(c.set_code)}"></i>`;
    }
    if (hasFinishBadges) {
      const sid = c.finish_printing_id || '';
      const badges = c.finish_options.map(f => {
        const isActive = c.finish === f;
        return `<span class="finish-badge${isActive ? ' active' : ''}" data-img-id="${img.id}" data-scryfall-id="${escapeHtml(sid)}" data-finish="${escapeHtml(f)}">${escapeHtml(f)}</span>`;
      }).join('');
      finishHtml = `<div class="finish-badges">${badges}</div>`;
      isFoil = resolved && c.finish === 'foil';
    } else if (resolved) {
      const finish = c.finish || 'nonfoil';
      finishHtml = `<span class="finish-overlay">${escapeHtml(finish)}</span>`;
      isFoil = finish === 'foil';
    }
    const name = c.name || '';
    const cn = (resolved || finishResolved) && c.collector_number ? ` #${c.collector_number}` : '';
    if (name) titleHtml = `<div class="card-title">${escapeHtml(name)}${escapeHtml(cn)}</div>`;
  }
  return { setHtml, finishHtml, titleHtml, isFoil };
}

function applyCropToImg(imgEl, crop) {
  if (!crop || !crop.w || !crop.h) return;
  function apply() {
    const nw = imgEl.naturalWidth;
    const nh = imgEl.naturalHeight;
    if (!nw || !nh) return;
    const top = Math.max(0, crop.y);
    const left = Math.max(0, crop.x);
    const right = Math.max(0, nw - crop.x - crop.w);
    const bottom = Math.max(0, nh - crop.y - crop.h);
    imgEl.style.objectViewBox = `inset(${top}px ${right}px ${bottom}px ${left}px)`;
  }
  if (imgEl.complete && imgEl.naturalWidth) apply();
  else imgEl.addEventListener('load', apply);
}

function createCardEl(img) {
  const card = document.createElement('div');
  card.className = `img-card ${img.border_status}`;
  card.dataset.id = String(img.id);
  const errorIcon = img.border_status === 'error' ? '<div class="error-icon">&times;</div>' : '';
  const errorTooltip = img.border_status === 'error' && img.error_message
    ? `<div class="error-tooltip">${escapeHtml(img.error_message.substring(0, 200))}</div>` : '';
  const { setHtml, finishHtml, titleHtml, isFoil } = buildCardOverlays(img);
  card.innerHTML = `
    <img src="/api/ingest/image/${img.stored_name}" alt="${escapeHtml(img.filename)}" loading="lazy"${isFoil ? ' class="foil"' : ''}>
    <div class="foil-shimmer"></div>
    ${errorIcon}
    ${errorTooltip}
    ${setHtml}
    ${finishHtml}
    ${titleHtml}
  `;
  applyCropToImg(card.querySelector('img'), img.crop);
  card.addEventListener('click', (e) => {
    if (e.target.closest('.finish-badge')) return;
    toggleAccordion(img.id);
  });
  return card;
}

// Single shared accordion panel — repositioned into the correct row on click
const accordionPanel = document.createElement('div');
accordionPanel.className = 'accordion-content';
accordionPanel.id = 'accordion-panel';

// ── Accordion detail cache + helpers ─────────────────────────────────────────

const detailCache = new Map();

async function loadAccordionDetail(imgId) {
  if (detailCache.has(imgId)) return detailCache.get(imgId);
  const resp = await fetch(`/api/ingest2/images/${imgId}`);
  const detail = await resp.json();
  detailCache.set(imgId, detail);
  return detail;
}

function invalidateDetailCache(imgId) {
  detailCache.delete(imgId);
}

function narrowCandidates(candidates, cardInfo) {
  if (candidates.length <= 1) return candidates;
  let result = candidates;
  const artist = cardInfo.artist;
  if (artist) {
    const al = artist.toLowerCase();
    const matched = result.filter(c => (c.artist || '').toLowerCase().includes(al));
    if (matched.length) result = matched;
  }
  const setCode = cardInfo.set_code;
  if (setCode) {
    const sl = setCode.toLowerCase();
    const matched = result.filter(c => c.set_code.toLowerCase() === sl);
    if (matched.length) result = matched;
  }
  const cn = cardInfo.collector_number;
  if (cn) {
    const matched = result.filter(c => c.collector_number === cn);
    if (matched.length) result = matched;
  }
  return result;
}

function _expandByFinish(candidates) {
  const expanded = [];
  for (const c of candidates) {
    const finishes = c.finishes && c.finishes.length ? c.finishes : ['nonfoil'];
    for (const f of finishes) {
      expanded.push({...c, _finish: f});
    }
  }
  return expanded;
}

function renderAccCandidates(containerEl, candidates, currentSid, onSelect, currentFinish) {
  containerEl.innerHTML = '';
  const expanded = _expandByFinish(candidates);
  if (!expanded.length) {
    containerEl.innerHTML = '<div style="padding:8px;color:#888;text-align:center;font-size:0.8rem;">No candidates found. Try searching.</div>';
    return;
  }
  containerEl.className = 'acc-candidates';
  for (const c of expanded) {
    const el = document.createElement('div');
    el.className = 'acc-candidate';
    el.dataset.scryfallId = c.printing_id;
    const setCode = keyruneSetCode(c.set_code);
    const rarityClass = `ss-${c.rarity || 'common'}`;
    el.innerHTML = `
      <div class="card-img-wrap">
        ${c.image_uri ? `<img src="${c.image_uri}" loading="lazy" title="${escapeHtml(c.name)} — ${escapeHtml(c.set_name || '')}">` : `<div style="width:100%;aspect-ratio:63/44;background:#0d1117;border-radius:3px;"></div>`}
        <i class="ss ss-${setCode} ${rarityClass} ss-grad set-overlay"></i>
        <span class="cn-overlay">#${escapeHtml(c.collector_number || '')}</span>
        <span class="finish-overlay">${escapeHtml(c._finish)}</span>
      </div>
    `;
    el.title = `${c.name} — ${c.set_name || ''}`;
    if (currentSid && c.printing_id === currentSid && (!currentFinish || c._finish === currentFinish)) el.classList.add('selected');
    el.addEventListener('click', () => {
      containerEl.querySelectorAll('.acc-candidate').forEach(r => r.classList.remove('selected'));
      el.classList.add('selected');
      onSelect(c);
    });
    containerEl.appendChild(el);
  }
}

function buildAccTraceEl(detail) {
  const agentLines = detail.agent_trace || [];
  const ocrFragments = detail.ocr_result || [];
  if (!agentLines.length && !ocrFragments.length) return null;

  const ocrLines = [`[OCR] ${ocrFragments.length} fragment(s):`];
  for (let i = 0; i < ocrFragments.length; i++) {
    const f = ocrFragments[i];
    const b = f.bbox || {};
    ocrLines.push(
      `[${i}] (x=${Math.round(b.x ?? 0)},y=${Math.round(b.y ?? 0)} ` +
      `w=${Math.round(b.w ?? 0)},h=${Math.round(b.h ?? 0)} ` +
      `conf=${(f.confidence ?? 0).toFixed(2)}): "${f.text ?? ''}"`
    );
  }
  const claudeResult = detail.claude_result || [];
  const finalLines = claudeResult.length
    ? ['', '[FINAL OUTPUT]', ...JSON.stringify({cards: claudeResult}, null, 2).split('\n')]
    : [];
  const allLines = [...ocrLines, '', ...agentLines, ...finalLines];

  function traceClass(line) {
    if (line.startsWith('[OCR]') || line.match(/^\[\d+\]/)) return 'tl-ocr';
    if (line === '') return 'tl-ocr';
    if (line.startsWith('[TOOL RESULT]')) return 'tl-result';
    if (line.startsWith('[TOOL CALL'))    return 'tl-tool';
    if (line.startsWith('[FINAL') || line.startsWith('[USAGE]')) return 'tl-final';
    return 'tl-agent';
  }

  const traceHtml = allLines.map(l =>
    `<span class="${traceClass(l)}">${escapeHtml(l)}</span>`
  ).join('\n');
  const details = document.createElement('div');
  details.className = 'agent-trace';
  details.innerHTML = `<div class="trace-lines">${traceHtml}</div>`;
  return details;
}

function renderAccordionContent(imgId, detail) {
  // Race guard: panel may have moved to a different image
  if (accordionPanel.dataset.imgId !== String(imgId)) return;

  const disambiguated = detail.disambiguated || [];
  const matches = detail.scryfall_matches || [];
  const claude = detail.claude_result || [];
  const cardNames = detail.card_names || [];
  const confirmedFinishes = detail.confirmed_finishes || [];

  let html = '';

  // Zero cards
  if (disambiguated.length === 0) {
    html += `<div class="acc-layout">`;
    html += `<div class="acc-sidebar">`;
    html += `<div class="card-title">No cards detected</div>`;
    html += `<button class="secondary" onclick="accReprocess(${imgId})">\u21ba Reprocess</button>`;
    html += `<div class="btn-row">`;
    html += `<button class="trace-toggle" onclick="accToggleTrace()">\u{1f41b}</button>`;
    html += `<button class="danger" onclick="accDeleteImage(${imgId})">Delete</button>`;
    html += `</div>`;
    html += `<input type="text" id="acc-search-input-${imgId}" placeholder="Replace with...">`;
    html += `</div>`;
    html += `<div class="acc-main">`;
    html += `<div id="acc-candidates-${imgId}" class="acc-candidates"></div>`;
    html += `</div></div>`;
    accordionPanel.innerHTML = html;

    const searchInput = document.getElementById(`acc-search-input-${imgId}`);
    if (searchInput) {
      searchInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') accSearchCard(imgId);
      });
    }

    const traceEl = buildAccTraceEl(detail);
    if (traceEl) accordionPanel.appendChild(traceEl);
    return;
  }

  // Exactly one card
  const sid = disambiguated[0];
  const cardInfo = claude[0] || {};
  const candidates = matches[0] || [];
  const cardName = cardInfo.name || (cardNames[0] || {}).claude_name || '(Unknown)';
  const isPending = sid === null || sid === 'skipped';

  // Sidebar: title, reprocess, delete, search field
  html += `<div class="acc-layout">`;
  html += `<div class="acc-sidebar">`;
  html += `<div class="card-title">${escapeHtml(cardName)}</div>`;
  html += `<button class="secondary" onclick="accReprocess(${imgId})">\u21ba Reprocess</button>`;
  html += `<div class="btn-row">`;
  html += `<button class="trace-toggle" onclick="accToggleTrace()">\u{1f41b}</button>`;
  html += `<button class="danger" onclick="accDeleteImage(${imgId})">Delete</button>`;
  html += `</div>`;

  if (sid !== 'already_ingested') {
    html += `<input type="text" id="acc-search-input-${imgId}" placeholder="Replace with..." value="${escapeHtml(cardInfo.name || '')}">`;
  }

  html += `</div>`;

  // Main: candidates
  html += `<div class="acc-main">`;
  if (sid !== 'already_ingested') {
    html += `<div id="acc-candidates-${imgId}" class="acc-candidates"></div>`;
  } else {
    html += `<div style="color:#888;font-size:0.85rem;">Already ingested</div>`;
  }
  html += `</div></div>`;

  accordionPanel.innerHTML = html;

  if (sid === 'already_ingested') {
    const traceEl = buildAccTraceEl(detail);
    if (traceEl) accordionPanel.appendChild(traceEl);
    return;
  }

  // Wire up enter key on search
  const searchInput = document.getElementById(`acc-search-input-${imgId}`);
  if (searchInput) {
    searchInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') accSearchCard(imgId);
    });
  }

  // Render candidates
  const highlightSid = isPending ? null : sid;
  let narrowed = isPending ? narrowCandidates(candidates, cardInfo) : candidates;
  if (narrowed.length <= 1 && candidates.length > 1) narrowed = candidates;
  const containerEl = document.getElementById(`acc-candidates-${imgId}`);

  const onSelect = async (c) => {
    const endpoint = isPending ? '/api/ingest2/confirm' : '/api/ingest2/correct';
    await fetch(endpoint, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ image_id: imgId, card_idx: 0, printing_id: c.printing_id, finish: c._finish || 'nonfoil' }),
    });
    await accRefresh(imgId);
  };

  const highlightFinish = isPending ? null : (confirmedFinishes[0] || null);
  renderAccCandidates(containerEl, narrowed, highlightSid, onSelect, highlightFinish);

  // Show all button if narrowed
  if (narrowed.length < candidates.length) {
    const showAllDiv = document.createElement('div');
    showAllDiv.style.cssText = 'padding:6px;text-align:center;';
    const btn = document.createElement('button');
    btn.className = 'secondary';
    btn.style.cssText = 'font-size:0.75rem;padding:3px 10px;';
    btn.textContent = `Show all ${candidates.length} candidates`;
    btn.addEventListener('click', () => {
      renderAccCandidates(containerEl, candidates, highlightSid, onSelect, highlightFinish);
    });
    showAllDiv.appendChild(btn);
    containerEl.appendChild(showAllDiv);
  }

  // Trace
  const traceEl = buildAccTraceEl(detail);
  if (traceEl) accordionPanel.appendChild(traceEl);
}

// ── Accordion mutation handlers ──────────────────────────────────────────────

async function accRefresh(imgId) {
  invalidateDetailCache(imgId);
  const detail = await loadAccordionDetail(imgId);
  if (accordionPanel.dataset.imgId === String(imgId)) {
    renderAccordionContent(imgId, detail);
  }
  // Also refresh the grid card
  const resp = await fetch(`/api/ingest2/recent?hours=${currentHours}&id=${imgId}`);
  const images = await resp.json();
  if (images.length) {
    const card = document.querySelector(`#grid .img-card[data-id="${imgId}"]`);
    if (card) updateCardEl(card, images[0]);
  }
  updateSummaryFromGrid();
}

function updateSummaryFromGrid() {
  // Re-fetch summary from server to stay accurate
  fetch(`/api/ingest2/recent?hours=${currentHours}`)
    .then(r => r.json())
    .then(images => updateSummary(images));
}

async function accDeleteCard(imgId, sid) {
  const isConfirmed = sid && sid !== 'null' && sid !== 'skipped' && sid !== 'already_ingested';
  const msg = isConfirmed
    ? 'Remove this card from the image and your collection?'
    : 'Remove this card slot from the image?';
  if (!confirm(msg)) return;
  await fetch('/api/ingest2/remove-card', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ image_id: imgId, card_idx: 0 }),
  });
  await accRefresh(imgId);
}

async function accSearchCard(imgId) {
  const input = document.getElementById(`acc-search-input-${imgId}`);
  const query = (input ? input.value : '').trim();
  if (!query) return;
  const resp = await fetch('/api/ingest2/search-card', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ image_id: imgId, card_idx: 0, query }),
  });
  const data = await resp.json();
  const containerEl = document.getElementById(`acc-candidates-${imgId}`);
  if (containerEl) {
    const detail = detailCache.get(imgId);
    const searchIsPending = detail && (detail.disambiguated || [])[0] == null;
    renderAccCandidates(containerEl, data.candidates || [], null, async (c) => {
      const endpoint = searchIsPending ? '/api/ingest2/confirm' : '/api/ingest2/correct';
      await fetch(endpoint, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ image_id: imgId, card_idx: 0, printing_id: c.printing_id, finish: c._finish || 'nonfoil' }),
      });
      await accRefresh(imgId);
    });
  }
}

async function accReprocess(imgId) {
  if (!confirm('Reset this image and reprocess from scratch?\n\nAny cards already added from this image will be removed.')) return;
  await fetch('/api/ingest2/reset', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ image_id: imgId }),
  });
  invalidateDetailCache(imgId);
  accordionPanel.classList.remove('open');
  const card = document.querySelector(`#grid .img-card.selected`);
  if (card) card.classList.remove('selected');

  await loadRecent();
}

function accToggleTrace() {
  const trace = accordionPanel.querySelector('.agent-trace');
  if (trace) trace.classList.toggle('visible');
}

async function accDeleteImage(imgId) {
  if (!confirm('Delete this image and any collection entries from it?')) return;
  await fetch('/api/ingest2/delete', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ image_id: imgId }),
  });
  invalidateDetailCache(imgId);
  accordionPanel.classList.remove('open');
  const card = document.querySelector(`#grid .img-card[data-id="${imgId}"]`);
  if (card) card.remove();

  updateSummaryFromGrid();
}

// ── Toggle accordion ─────────────────────────────────────────────────────────

function repositionAccordion() {
  if (!accordionPanel.classList.contains('open')) return;
  const grid = document.getElementById('grid');
  const sel = grid.querySelector('.img-card.selected');
  if (!sel) return;
  const cards = Array.from(grid.querySelectorAll('.img-card'));
  const idx = cards.indexOf(sel);
  const rowEnd = Math.min(Math.floor(idx / gridCols) * gridCols + gridCols - 1, cards.length - 1);
  cards[rowEnd].after(accordionPanel);
}

async function toggleAccordion(imgId) {
  const id = String(imgId);
  const grid = document.getElementById('grid');
  const card = grid.querySelector(`.img-card[data-id="${id}"]`);
  if (!card) return;

  // Clicking the already-selected card closes the panel
  if (card.classList.contains('selected')) {
    accordionPanel.classList.remove('open');
    card.classList.remove('selected');
    return;
  }

  // Deselect previous
  const prev = grid.querySelector('.img-card.selected');
  if (prev) prev.classList.remove('selected');

  // Get all card elements (exclude the accordion itself)
  const cards = Array.from(grid.querySelectorAll('.img-card'));
  const idx = cards.indexOf(card);
  const rowEnd = Math.min(Math.floor(idx / gridCols) * gridCols + gridCols - 1, cards.length - 1);

  // Move accordion after the last card in this row
  cards[rowEnd].after(accordionPanel);
  accordionPanel.dataset.imgId = id;
  accordionPanel.innerHTML = '<div style="color:#888;padding:8px;">Loading...</div>';
  accordionPanel.classList.add('open');
  card.classList.add('selected');

  // Fetch detail and render
  const detail = await loadAccordionDetail(imgId);
  renderAccordionContent(imgId, detail);

  // Scroll accordion into view if it extends below the viewport
  requestAnimationFrame(() => {
    const rect = accordionPanel.getBoundingClientRect();
    if (rect.bottom > window.innerHeight) {
      accordionPanel.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }
  });
}

function updateCardEl(card, img) {
  const wasSelected = card.classList.contains('selected');
  card.className = `img-card ${img.border_status}`;
  if (wasSelected) card.classList.add('selected');

  let errorIcon = card.querySelector('.error-icon');
  if (img.border_status === 'error') {
    if (!errorIcon) {
      errorIcon = document.createElement('div');
      errorIcon.className = 'error-icon';
      errorIcon.innerHTML = '&times;';
      card.appendChild(errorIcon);
    }
  } else if (errorIcon) {
    errorIcon.remove();
  }

  let tooltip = card.querySelector('.error-tooltip');
  if (img.border_status === 'error' && img.error_message) {
    if (!tooltip) {
      tooltip = document.createElement('div');
      tooltip.className = 'error-tooltip';
      card.appendChild(tooltip);
    }
    tooltip.textContent = img.error_message.substring(0, 200);
  } else if (tooltip) {
    tooltip.remove();
  }

  const { setHtml, finishHtml, titleHtml, isFoil } = buildCardOverlays(img);

  // Update foil class on img
  const imgEl = card.querySelector('img');
  if (imgEl) imgEl.classList.toggle('foil', isFoil);

  // Apply crop zoom if available (e.g. after processing completes)
  if (imgEl && img.crop && !imgEl.style.objectViewBox) {
    applyCropToImg(imgEl, img.crop);
  }

  // Ensure foil-shimmer div exists
  if (!card.querySelector('.foil-shimmer')) {
    imgEl.insertAdjacentHTML('afterend', '<div class="foil-shimmer"></div>');
  }

  // Update set overlay
  const oldSet = card.querySelector('.set-overlay');
  if (oldSet) oldSet.remove();
  if (setHtml) imgEl.insertAdjacentHTML('afterend', setHtml);

  // Update finish overlay / badges
  const oldFinish = card.querySelector('.finish-overlay');
  if (oldFinish) oldFinish.remove();
  const oldBadges = card.querySelector('.finish-badges');
  if (oldBadges) oldBadges.remove();
  if (finishHtml) imgEl.insertAdjacentHTML('afterend', finishHtml);

  // Update card title
  const oldTitle = card.querySelector('.card-title');
  if (oldTitle) oldTitle.remove();
  if (titleHtml) card.insertAdjacentHTML('beforeend', titleHtml);
}

function updateSummary(images) {
  const summary = document.getElementById('summary');
  const batchBtn = document.getElementById('batch-btn');
  if (images.length === 0) {
    summary.textContent = '';
    batchBtn.style.display = 'none';
    return;
  }
  const counts = { processing: 0, done: 0, needs_disambiguation: 0, error: 0 };
  for (const img of images) {
    counts[img.border_status] = (counts[img.border_status] || 0) + 1;
  }
  const parts = [];
  if (counts.processing > 0) parts.push(`${counts.processing} processing`);
  if (counts.done > 0) parts.push(`${counts.done} done`);
  if (counts.needs_disambiguation > 0) parts.push(`${counts.needs_disambiguation} need disambiguation`);
  if (counts.error > 0) parts.push(`${counts.error} error`);
  summary.textContent = `${images.length} image(s): ${parts.join(', ')}`;
  batchBtn.style.display = counts.done > 0 ? 'inline-block' : 'none';
}

// ── Full render (initial load + time-pill changes) ───────────────────────────

async function loadRecent() {
  const resp = await fetch(`/api/ingest2/recent?hours=${currentHours}`);
  const images = await resp.json();

  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');

  updateSummary(images);

  if (images.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    syncPolls([]);
    return;
  }
  empty.style.display = 'none';

  const existingCards = {};
  grid.querySelectorAll('.img-card[data-id]').forEach(el => {
    existingCards[el.dataset.id] = el;
  });

  const newIds = new Set(images.map(img => String(img.id)));
  for (const [id, el] of Object.entries(existingCards)) {
    if (!newIds.has(id)) el.remove();
  }

  // Close accordion if its card was removed
  const selectedId = grid.querySelector('.img-card.selected')?.dataset.id;
  if (selectedId && !newIds.has(selectedId)) {
    accordionPanel.classList.remove('open');
  
  }

  let prevEl = null;
  for (const img of images) {
    const id = String(img.id);
    let card = existingCards[id];
    if (card) {
      updateCardEl(card, img);
    } else {
      card = createCardEl(img);
      if (prevEl) prevEl.after(card);
      else grid.prepend(card);
    }
    if (prevEl && card.previousElementSibling !== prevEl) prevEl.after(card);
    prevEl = card;
  }

  syncPolls(images);
}

// ── Per-image polling ────────────────────────────────────────────────────────

function syncPolls(images) {
  const processingIds = new Set();
  for (const img of images) {
    if (img.border_status === 'processing') {
      processingIds.add(img.id);
      if (!activePolls.has(img.id)) {
        activePolls.set(img.id, setInterval(() => pollOneImage(img.id), 3000));
      }
    }
  }
  for (const [id, timer] of activePolls) {
    if (!processingIds.has(id)) {
      clearInterval(timer);
      activePolls.delete(id);
    }
  }
}

async function pollOneImage(id) {
  const resp = await fetch(`/api/ingest2/recent?hours=${currentHours}&id=${id}`);
  const images = await resp.json();
  if (images.length === 0) {
    clearInterval(activePolls.get(id));
    activePolls.delete(id);
    return;
  }
  const img = images[0];
  const card = document.querySelector(`#grid .img-card[data-id="${id}"]`);
  if (card) updateCardEl(card, img);
  if (img.border_status !== 'processing') {
    clearInterval(activePolls.get(id));
    activePolls.delete(id);
  }
}

// ── Discovery poll (slow — finds new images uploaded while page is open) ─────

async function discoverNewImages() {
  const resp = await fetch(`/api/ingest2/recent?hours=${currentHours}`);
  const images = await resp.json();
  const grid = document.getElementById('grid');
  let foundNew = false;
  for (const img of images) {
    if (!grid.querySelector(`.img-card[data-id="${img.id}"]`)) {
      grid.prepend(createCardEl(img));
      foundNew = true;
      if (img.border_status === 'processing' && !activePolls.has(img.id)) {
        activePolls.set(img.id, setInterval(() => pollOneImage(img.id), 3000));
      }
    }
  }
  if (foundNew) updateSummary(images);
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}


function fmtTokens(n) {
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
  if (n >= 1000) return Math.round(n / 1000) + 'K';
  return String(n);
}

async function loadUsageStats() {
  const resp = await fetch(`/api/ingest2/usage-stats?hours=${currentHours}`);
  const data = await resp.json();
  const box = document.getElementById('usage-box');
  const u = data.usage;
  const cost = data.estimated_cost_usd;

  const parts = [];
  if (u.haiku.input + u.haiku.output > 0)
    parts.push(`${fmtTokens(u.haiku.input + u.haiku.output)} haiku`);
  if (u.sonnet.input + u.sonnet.output > 0)
    parts.push(`${fmtTokens(u.sonnet.input + u.sonnet.output)} sonnet`);
  if (u.opus.input + u.opus.output > 0)
    parts.push(`${fmtTokens(u.opus.input + u.opus.output)} opus`);

  if (parts.length === 0) {
    box.innerHTML = '';
    return;
  }
  box.innerHTML = `<span class="usage-cost">~$${cost.toFixed(4)}</span><br>${parts.join(' · ')}`;
}

async function batchIngest() {
  const btn = document.getElementById('batch-btn');
  const msg = document.getElementById('batch-msg');
  btn.disabled = true;
  const resp = await fetch('/api/ingest2/batch-ingest', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ hours: currentHours }),
  });
  const data = await resp.json();
  btn.disabled = false;
  if (data.ok) {
    // Remove done cards from the grid
    const grid = document.getElementById('grid');
    grid.querySelectorAll('.img-card.done').forEach(el => el.remove());
    // Close accordion if open
    accordionPanel.classList.remove('open');
    const sel = grid.querySelector('.img-card.selected');
    if (sel) sel.classList.remove('selected');
    // Show message
    msg.innerHTML = `${data.count} photo${data.count !== 1 ? 's' : ''} inserted: See them in <a href="/collection">Collection</a>.`;
    // Update summary from remaining images
    updateSummaryFromGrid();
  }
}

// ── Finish badge click delegation ─────────────────────────────────────────────

document.getElementById('grid').addEventListener('click', async (e) => {
  const badge = e.target.closest('.finish-badge');
  if (!badge) return;
  e.stopPropagation();

  const imgId = Number(badge.dataset.imgId);
  const scryfallId = badge.dataset.scryfallId;
  const finish = badge.dataset.finish;

  // Determine if already done (correct) or pending (confirm)
  const card = badge.closest('.img-card');
  const isDone = card && card.classList.contains('done');
  const endpoint = isDone ? '/api/ingest2/correct' : '/api/ingest2/confirm';

  await fetch(endpoint, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ image_id: imgId, card_idx: 0, printing_id: scryfallId, finish }),
  });

  // Refresh the single card
  const resp = await fetch(`/api/ingest2/recent?hours=${currentHours}&id=${imgId}`);
  const images = await resp.json();
  if (images.length && card) updateCardEl(card, images[0]);

  // Refresh accordion if open for this card
  invalidateDetailCache(imgId);
  if (accordionPanel.dataset.imgId === String(imgId) && accordionPanel.classList.contains('open')) {
    const detail = await loadAccordionDetail(imgId);
    renderAccordionContent(imgId, detail);
  }

  updateSummaryFromGrid();
});

loadRecent();
loadUsageStats();
discoveryTimer = setInterval(discoverNewImages, 20000);
setInterval(loadUsageStats, 30000);
